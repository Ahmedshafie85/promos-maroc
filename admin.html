<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#C1272D">
<title>Admin · Promos Maroc</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23C1272D'/><text x='50' y='68' font-size='50' font-weight='900' text-anchor='middle' fill='white' font-family='system-ui'>⚙</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --primary:#C1272D; --primary-dark:#8B1A1F; --primary-soft:#FDEEEF; --secondary:#D4A017; --accent:#1B5E7A; --bg:#F5F5F7; --surface:#FFFFFF; --text:#1A1A1A; --text-2:#666; --text-3:#999; --border:#E5E5EA; --success:#27AE60; --danger:#E74C3C; --warning:#F39C12; --shadow-sm:0 1px 3px rgba(0,0,0,.06); --shadow-md:0 4px 12px rgba(0,0,0,.08); --shadow-lg:0 8px 24px rgba(0,0,0,.12); }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Tajawal','Cairo',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; }
button, input, select, textarea { font-family:inherit; }

.login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); }
.login-card { background:white; border-radius:20px; padding:40px 32px; width:100%; max-width:400px; box-shadow:var(--shadow-lg); }
.login-logo { font-size:64px; text-align:center; margin-bottom:16px; }
.login-title { font-size:24px; font-weight:800; text-align:center; margin-bottom:8px; }
.login-field { margin-bottom:16px; }
.login-field label { display:block; font-size:13px; font-weight:700; color:var(--text-2); margin-bottom:6px; }
.login-field input { width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:15px; outline:none; }
.login-btn { width:100%; background:var(--primary); color:white; border:none; padding:14px; border-radius:10px; font-size:16px; font-weight:800; cursor:pointer; }
.login-error { background:#FFE5E5; color:var(--danger); padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none; }
.login-error.show { display:block; }

.admin-app { display:none; }
.admin-app.show { display:block; }
.topbar { background:white; padding:14px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:50; }
.topbar-brand { font-size:18px; font-weight:800; }
.logout-btn { background:none; border:1.5px solid var(--border); padding:6px 12px; border-radius:8px; cursor:pointer; }

.tabs { background:white; padding:0 24px; border-bottom:1px solid var(--border); display:flex; gap:4px; overflow-x:auto; }
.tab { background:none; border:none; padding:14px 18px; font-size:14px; font-weight:700; color:var(--text-2); cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; }
.tab.active { color:var(--primary); border-bottom-color:var(--primary); }

.content { padding:24px; max-width:1200px; margin:0 auto; }
.section { display:none; }
.section.active { display:block; }
.section-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.add-btn { background:var(--primary); color:white; border:none; padding:10px 18px; border-radius:10px; font-weight:700; cursor:pointer; }

.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
.item-card { background:white; border-radius:12px; padding:14px; box-shadow:var(--shadow-sm); display:flex; gap:12px; }
.item-thumb { width:64px; height:64px; border-radius:10px; background:var(--bg); display:flex; align-items:center; justify-content:center; overflow:hidden; }
.item-thumb img { width:100%; height:100%; object-fit:cover; }
.item-body { flex:1; min-width:0; }
.item-title { font-size:14px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.item-actions { display:flex; gap:6px; margin-top:8px; }
.btn-mini { background:var(--bg); border:1px solid var(--border); padding:5px 10px; border-radius:6px; font-size:12px; cursor:pointer; }

.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.show { display:flex; }
.modal { background:white; border-radius:16px; width:100%; max-width:560px; padding:24px; max-height:90vh; overflow-y:auto; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:12px; font-weight:700; margin-bottom:4px; color:var(--text-2); }
.field input, .field select { width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; }

.smart-paste { background:linear-gradient(135deg,#FFF8E1,#FFF3CD); border:2px solid var(--secondary); border-radius:12px; padding:16px; margin-bottom:18px; }
.smart-paste-row { display:flex; gap:8px; margin-top:8px; }
.smart-paste-row input { flex:1; padding:10px; border:1px solid var(--border); border-radius:8px; }
.smart-paste-row button { background:var(--secondary); color:white; border:none; padding:10px 18px; border-radius:8px; font-weight:800; cursor:pointer; }
.smart-paste-status { font-size:12px; margin-top:8px; display:none; }
.smart-paste-status.show { display:block; }
.smart-paste-status.success { color:var(--success); }
.smart-paste-status.error { color:var(--danger); }
.row-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.img-preview { margin-top:8px; min-height:0; }
.img-preview img { max-width:160px; max-height:160px; border-radius:8px; border:1px solid var(--border); }

.toast { position:fixed; top:24px; left:50%; transform:translateX(-50%); background:var(--text); color:white; padding:12px 24px; border-radius:10px; opacity:0; transition:0.3s; z-index:999; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">⚙️</div>
    <div class="login-title">Admin Login</div>
    <div class="login-error" id="login-error"></div>
    <form id="login-form">
      <div class="login-field"><label>Email</label><input type="email" id="login-email" required></div>
      <div class="login-field"><label>Password</label><input type="password" id="login-password" required></div>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>
</div>

<div class="admin-app" id="admin-app">
  <div class="topbar">
    <div class="topbar-brand">⚙️ Promos Maroc Admin</div>
    <div class="topbar-user"><span id="user-email"></span> <button onclick="auth.signOut()">Logout</button></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="dashboard" onclick="showTab('dashboard')">📊 Dashboard</button>
    <button class="tab" data-tab="deals" onclick="showTab('deals')">🛍️ Deals</button>
    <button class="tab" data-tab="stores" onclick="showTab('stores')">🏪 Stores</button>
    <button class="tab" data-tab="categories" onclick="showTab('categories')">📂 Categories</button>
  </div>

  <div class="content">
    <div class="section active" id="section-dashboard">
      <h2>📊 Stats</h2>
      <p>Deals: <strong id="stat-deals">0</strong></p>
      <p>Stores: <strong id="stat-stores">0</strong></p>
    </div>

    <div class="section" id="section-deals">
      <div class="section-head"><h2>🛍️ Deals</h2><button class="add-btn" onclick="openDealForm()">+ Add Deal</button></div>
      <div id="deals-list" class="cards-grid"></div>
    </div>

    <div class="section" id="section-stores">
      <div class="section-head"><h2>🏪 Stores</h2><button class="add-btn" onclick="openStoreForm()">+ Add Store</button></div>
      <div id="stores-list" class="cards-grid"></div>
    </div>

    <div class="section" id="section-categories">
      <div class="section-head"><h2>📂 Categories</h2><button class="add-btn" onclick="openCategoryForm()">+ Add Category</button></div>
      <div id="categories-list" class="cards-grid"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal-content"></div></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
// The Engine URL
const WORKER_URL = "https://promos-maroc-fetcher.abdelshafie-ahmed.workers.dev";

let db, auth, storage;
let DEALS=[], STORES=[], CATEGORIES=[];

try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    auth = firebase.auth();
    storage = firebase.storage();
    
    auth.onAuthStateChanged(user => {
        if (user && user.email === ADMIN_EMAIL) {
            document.getElementById('user-email').textContent = user.email;
            document.getElementById('admin-app').classList.add('show');
            document.getElementById('login-screen').style.display = 'none';
            startListeners();
        } else {
            document.getElementById('admin-app').classList.remove('show');
            document.getElementById('login-screen').style.display = 'flex';
        }
    });
} catch (e) { console.error("Firebase Init Failed", e); }

function $(id) { return document.getElementById(id); }

function showTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'section-' + name));
}

function startListeners() {
    db.collection('deals').onSnapshot(snap => { DEALS = snap.docs.map(d => ({id:d.id, ...d.data()})); renderDeals(); });
    db.collection('stores').onSnapshot(snap => { STORES = snap.docs.map(d => ({id:d.id, ...d.data()})); renderStores(); });
    db.collection('categories').onSnapshot(snap => { CATEGORIES = snap.docs.map(d => ({id:d.id, ...d.data()})); renderCategories(); });
}

function renderDeals() {
    $('stat-deals').textContent = DEALS.length;
    $('deals-list').innerHTML = DEALS.map(d => `
        <div class="item-card">
            <div class="item-thumb">${d.imageUrl ? `<img src="${d.imageUrl}" onerror="this.parentElement.innerHTML='🛍️'">` : '🛍️'}</div>
            <div class="item-body">
                <div class="item-title">${d.title || d.titleEn || d.titleAr || '(untitled)'}</div>
                <div style="font-size:12px;color:var(--text-2);margin-top:2px">
                    ${d.new ? `<strong style="color:var(--primary)">${d.new} DH</strong>` : ''}
                    ${d.old && d.old > d.new ? `<span style="text-decoration:line-through;margin-left:6px">${d.old} DH</span>` : ''}
                    ${d.disc ? `<span style="background:var(--success);color:white;padding:1px 6px;border-radius:4px;margin-left:6px;font-size:11px">-${d.disc}%</span>` : ''}
                </div>
                <div class="item-actions">
                    <button class="btn-mini" onclick="openDealForm('${d.id}')">Edit</button>
                    <button class="btn-mini" onclick="deleteItem('deals','${d.id}')">Delete</button>
                </div>
            </div>
        </div>`).join('');
}

function renderStores() {
    $('stat-stores').textContent = STORES.length;
    $('stores-list').innerHTML = STORES.map(s => `
        <div class="item-card">
            <div class="item-thumb" style="background:${s.color}">${s.logoUrl ? `<img src="${s.logoUrl}">` : s.name.charAt(0)}</div>
            <div class="item-body">
                <div class="item-title">${s.name}</div>
                <button class="btn-mini" onclick="deleteItem('stores','${s.id}')">Delete</button>
            </div>
        </div>`).join('');
}

function renderCategories() {
    $('categories-list').innerHTML = CATEGORIES.map(c => `
        <div class="item-card">
            <div class="item-thumb">${c.imageUrl ? `<img src="${c.imageUrl}" onerror="this.parentElement.textContent='📂'">` : (c.icon || '📂')}</div>
            <div class="item-body">
                <div class="item-title">${c.fr || ''}</div>
                <div style="font-size:11px;color:var(--text-3)">${c.en || ''}</div>
                <div class="item-actions">
                    <button class="btn-mini" onclick="deleteItem('categories','${c.id}')">Delete</button>
                </div>
            </div>
        </div>`).join('');
}

function openDealForm(id) {
    const d = id ? DEALS.find(x => x.id === id) : { title:'', titleEn:'', old:0, new:0, disc:0, storeId:'', cat:'', imageUrl:'', sourceUrl:'' };
    showModal(`
        <h3>🛍️ Deal Details</h3>
        <div class="smart-paste">
            <strong>🪄 Smart Paste</strong>
            <div class="smart-paste-row">
                <input type="url" id="sp-url" placeholder="Paste product URL...">
                <button type="button" onclick="runScraper()" id="sp-btn">Fetch</button>
            </div>
            <div id="sp-status" class="smart-paste-status"></div>
        </div>
        <form id="deal-form">
            <div class="field"><label>Title (FR)</label><input id="f-title" value="${esc(d.title)}"></div>
            <div class="field"><label>Title (EN) <span style="color:#999;font-weight:400">— optional</span></label><input id="f-titleEn" value="${esc(d.titleEn || d.titleAr || '')}"></div>
            <div class="row-2">
                <div class="field"><label>New Price (DH)</label><input type="number" step="0.01" id="f-new" value="${d.new || ''}"></div>
                <div class="field"><label>Old Price (DH)</label><input type="number" step="0.01" id="f-old" value="${d.old || ''}"></div>
            </div>
            <div class="field"><label>Discount (%)</label><input type="number" id="f-disc" value="${d.disc || ''}" placeholder="auto-calculated if empty"></div>
            <div class="field">
                <label>Image URL</label>
                <input type="url" id="f-imageUrl" value="${esc(d.imageUrl || '')}" placeholder="https://...">
                <div id="img-preview" class="img-preview">${d.imageUrl ? `<img src="${esc(d.imageUrl)}">` : ''}</div>
            </div>
            <div class="field"><label>Source URL <span style="color:#999;font-weight:400">— optional</span></label><input type="url" id="f-sourceUrl" value="${esc(d.sourceUrl || '')}"></div>
            <div class="field"><label>Store</label>
                <select id="f-storeId">
                    <option value="">— Select store —</option>
                    ${STORES.map(s => `<option value="${s.id}" ${d.storeId === s.id ? 'selected' : ''}>${esc(s.name)}</option>`).join('')}
                </select>
            </div>
            <div class="field"><label>Category</label>
                <select id="f-cat">
                    <option value="">— Select category —</option>
                    ${CATEGORIES.map(c => `<option value="${c.id}" ${d.cat === c.id ? 'selected' : ''}>${esc(c.fr || c.id)}</option>`).join('')}
                </select>
            </div>
            <button type="submit" class="login-btn">Save Deal</button>
        </form>
    `);
    // Live image preview
    $('f-imageUrl').oninput = () => {
        const url = $('f-imageUrl').value.trim();
        $('img-preview').innerHTML = url ? `<img src="${url}" onerror="this.style.display='none'">` : '';
    };
    // Save handler
    $('deal-form').onsubmit = async (e) => {
        e.preventDefault();
        const newPrice = parseFloat($('f-new').value) || 0;
        const oldPrice = parseFloat($('f-old').value) || 0;
        let disc = parseInt($('f-disc').value, 10);
        if (!disc && oldPrice > newPrice && oldPrice > 0) {
            disc = Math.round((1 - newPrice / oldPrice) * 100);
        }
        const data = {
            title: $('f-title').value.trim(),
            titleEn: $('f-titleEn').value.trim(),
            new: newPrice,
            old: oldPrice,
            disc: disc || 0,
            imageUrl: $('f-imageUrl').value.trim(),
            sourceUrl: $('f-sourceUrl').value.trim(),
            storeId: $('f-storeId').value,
            cat: $('f-cat').value,
            updatedAt: new Date()
        };
        try {
            if (id) {
                await db.collection('deals').doc(id).update(data);
            } else {
                data.createdAt = new Date();
                await db.collection('deals').add(data);
            }
            $('modal-overlay').classList.remove('show');
            showToast(id ? 'Deal updated' : 'Deal added');
        } catch(err) { alert('Save failed: ' + err.message); }
    };
}

function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function openStoreForm() {
    showModal(`
        <h3>🏪 Add Store</h3>
        <form id="store-form">
            <div class="field"><label>Name</label><input id="s-name" required></div>
            <div class="field"><label>Color (hex)</label><input id="s-color" value="#C1272D"></div>
            <div class="field">
                <label>Logo URL</label>
                <input id="s-logo" type="url" placeholder="https://...">
                <div id="store-img-preview" class="img-preview"></div>
            </div>
            <button type="submit" class="login-btn">Save Store</button>
        </form>
    `);
    $('s-logo').oninput = () => {
        const url = $('s-logo').value.trim();
        $('store-img-preview').innerHTML = url ? `<img src="${url}" onerror="this.style.display='none'">` : '';
    };
    $('store-form').onsubmit = async (e) => {
        e.preventDefault();
        try {
            await db.collection('stores').add({
                name: $('s-name').value.trim(),
                color: $('s-color').value.trim(),
                logoUrl: $('s-logo').value.trim(),
                createdAt: new Date()
            });
            $('modal-overlay').classList.remove('show');
            showToast('Store added');
        } catch(err) { alert('Save failed: ' + err.message); }
    };
}

function openCategoryForm() {
    showModal(`
        <h3>📂 Add Category</h3>
        <form id="cat-form">
            <div class="field"><label>Name (FR)</label><input id="c-fr" required></div>
            <div class="field"><label>Name (EN)</label><input id="c-en"></div>
            <div class="field">
                <label>Image URL</label>
                <input id="c-img" type="url" placeholder="https://...">
                <div id="cat-img-preview" class="img-preview"></div>
            </div>
            <div class="field"><label>Keywords (comma-separated, for auto-categorize)</label><input id="c-kw" placeholder="e.g. seche-cheveux, hygiene, beaute"></div>
            <button type="submit" class="login-btn">Save Category</button>
        </form>
    `);
    $('c-img').oninput = () => {
        const url = $('c-img').value.trim();
        $('cat-img-preview').innerHTML = url ? `<img src="${url}" onerror="this.style.display='none'">` : '';
    };
    $('cat-form').onsubmit = async (e) => {
        e.preventDefault();
        try {
            await db.collection('categories').add({
                fr: $('c-fr').value.trim(),
                en: $('c-en').value.trim(),
                imageUrl: $('c-img').value.trim(),
                keywords: $('c-kw').value.split(',').map(k => k.trim().toLowerCase()).filter(Boolean),
                createdAt: new Date()
            });
            $('modal-overlay').classList.remove('show');
            showToast('Category added');
        } catch(err) { alert('Save failed: ' + err.message); }
    };
}

// --- BULLETPROOF SCRAPER ---
async function runScraper() {
    const targetUrl = $('sp-url').value.trim();
    if (!targetUrl) return;

    const btn = $('sp-btn');
    const status = $('sp-status');
    
    btn.disabled = true;
    status.textContent = "⏳ Connecting to Cloud Browser…";
    status.className = "smart-paste-status show";

    try {
        const response = await window.fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: targetUrl })
        });

        const data = await response.json();
        if (!data.success) throw new Error(data.error || "Scraper Error");

        const parser = new DOMParser();
        const doc = parser.parseFromString(data.html, "text/html");
        const html = data.html;
        const domain = new URL(targetUrl).hostname.toLowerCase();

        let title = '', newPrice = '', oldPrice = '', disc = '', img = '';
        let categoryGuess = '';

        if (domain.includes('aswakassalam')) {
            // Title: WooCommerce class first, then h1
            title = doc.querySelector('.product_title')?.innerText
                 || doc.querySelector('h1.entry-title')?.innerText
                 || doc.querySelector('h1')?.innerText
                 || '';

            // Aswak (WooCommerce FR) renders prices as:
            //   "Le prix initial était : 299,00 Dh."   (old)
            //   "Le prix actuel est : 199,00 Dh."      (new)
            // Comma is the decimal separator. Match those literal markers.
            const oldM = html.match(/prix initial était[^0-9]*([0-9][0-9 .]*[,.]?[0-9]{0,2})\s*Dh/i);
            const newM = html.match(/prix actuel est[^0-9]*([0-9][0-9 .]*[,.]?[0-9]{0,2})\s*Dh/i);
            if (oldM) oldPrice = oldM[1].replace(/\s/g, '').replace(',', '.');
            if (newM) newPrice = newM[1].replace(/\s/g, '').replace(',', '.');

            // Fallback for products with no discount (single price only)
            if (!newPrice) {
                const single = doc.querySelector('p.price .woocommerce-Price-amount bdi')
                            || doc.querySelector('.price .woocommerce-Price-amount bdi')
                            || doc.querySelector('.woocommerce-Price-amount bdi');
                if (single) newPrice = single.innerText.replace(/[^0-9.,]/g, '').replace(',', '.');
            }

            // Discount badge: "-33%"
            const dm = html.match(/-\s*([0-9]{1,2})\s*%/);
            if (dm) disc = dm[1];

            // Main image: og:image meta first, then product gallery
            img = doc.querySelector('meta[property="og:image"]')?.getAttribute('content')
               || doc.querySelector('.woocommerce-product-gallery__image img')?.getAttribute('src')
               || doc.querySelector('.wp-post-image')?.getAttribute('src')
               || '';

            // Category guess from breadcrumbs / category links on page
            const catLinks = Array.from(doc.querySelectorAll('a[href*="product-category"]'));
            if (catLinks.length) {
                categoryGuess = catLinks[0].innerText.trim();
            }
        } else {
            // Generic fallback
            title = doc.querySelector('h1')?.innerText
                 || doc.querySelector('meta[property="og:title"]')?.getAttribute('content')
                 || doc.title;
            const newM = html.match(/([0-9]{1,5}(?:[.,][0-9]{2})?)\s*(?:DH|Dh|MAD|درهم)/);
            if (newM) newPrice = newM[1].replace(',', '.');
            img = doc.querySelector('meta[property="og:image"]')?.getAttribute('content') || '';
        }

        // Auto-calc discount if we have both prices and no explicit %
        if (!disc && oldPrice && newPrice && parseFloat(oldPrice) > parseFloat(newPrice)) {
            disc = Math.round((1 - parseFloat(newPrice) / parseFloat(oldPrice)) * 100).toString();
        }

        // Auto-categorize against existing categories' keywords
        const titleLower = title.toLowerCase();
        const catGuessLower = categoryGuess.toLowerCase();
        let matchedCatId = '';
        for (const c of CATEGORIES) {
            const kws = (c.keywords || []).map(k => k.toLowerCase());
            if (!kws.length) continue;
            if (kws.some(k => titleLower.includes(k) || catGuessLower.includes(k))) {
                matchedCatId = c.id;
                break;
            }
        }

        // Fill the form
        if (title) $('f-title').value = title.trim();
        if (newPrice) $('f-new').value = newPrice;
        if (oldPrice) $('f-old').value = oldPrice;
        if (disc) $('f-disc').value = disc;
        if (img) {
            $('f-imageUrl').value = img;
            $('img-preview').innerHTML = `<img src="${img}" onerror="this.style.display='none'">`;
        }
        $('f-sourceUrl').value = targetUrl;
        if (matchedCatId) $('f-cat').value = matchedCatId;

        const filled = [title && 'title', newPrice && 'price', img && 'image'].filter(Boolean);
        if (filled.length) {
            status.textContent = `✅ Got: ${filled.join(', ')}${matchedCatId ? ' · category auto-matched' : ''}`;
            status.className = "smart-paste-status show success";
        } else {
            status.textContent = "⚠️ Page loaded but no fields extracted — fill manually";
            status.className = "smart-paste-status show error";
        }
    } catch (err) {
        status.textContent = "❌ " + err.message;
        status.className = "smart-paste-status show error";
    } finally {
        btn.disabled = false;
    }
}

function showModal(html) { $('modal-content').innerHTML=html; $('modal-overlay').classList.add('show'); }
$('modal-overlay').onclick = (e) => { if(e.target === $('modal-overlay')) $('modal-overlay').classList.remove('show'); };

async function deleteItem(col, id) {
    if(!confirm("Delete this?")) return;
    await db.collection(col).doc(id).delete();
    alert("Deleted");
}

$('login-form').onsubmit = async (e) => {
    e.preventDefault();
    try {
        await auth.signInWithEmailAndPassword($('login-email').value, $('login-password').value);
    } catch(err) { $('login-error').textContent = err.message; $('login-error').classList.add('show'); }
};
</script>
