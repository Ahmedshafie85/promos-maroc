<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#C1272D">
<title>Admin · Promos Maroc</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23C1272D'/><text x='50' y='68' font-size='50' font-weight='900' text-anchor='middle' fill='white' font-family='system-ui'>⚙</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --primary:#C1272D; --primary-dark:#8B1A1F; --primary-soft:#FDEEEF; --secondary:#D4A017; --accent:#1B5E7A; --bg:#F5F5F7; --surface:#FFFFFF; --text:#1A1A1A; --text-2:#666; --text-3:#999; --border:#E5E5EA; --success:#27AE60; --danger:#E74C3C; --warning:#F39C12; --shadow-sm:0 1px 3px rgba(0,0,0,.06); --shadow-md:0 4px 12px rgba(0,0,0,.08); --shadow-lg:0 8px 24px rgba(0,0,0,.12); }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Tajawal','Cairo',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; }
button, input, select, textarea { font-family:inherit; }

.login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); }
.login-card { background:white; border-radius:20px; padding:40px 32px; width:100%; max-width:400px; box-shadow:var(--shadow-lg); }
.login-logo { font-size:64px; text-align:center; margin-bottom:16px; }
.login-title { font-size:24px; font-weight:800; text-align:center; margin-bottom:8px; }
.login-subtitle { text-align:center; color:var(--text-2); margin-bottom:28px; font-size:14px; }
.login-field { margin-bottom:16px; }
.login-field label { display:block; font-size:13px; font-weight:700; color:var(--text-2); margin-bottom:6px; }
.login-field input { width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:15px; outline:none; transition:border-color .2s; }
.login-field input:focus { border-color:var(--primary); }
.login-btn { width:100%; background:var(--primary); color:white; border:none; padding:14px; border-radius:10px; font-size:16px; font-weight:800; cursor:pointer; margin-top:8px; }
.login-btn:hover { background:var(--primary-dark); }
.login-btn:disabled { opacity:.6; cursor:wait; }
.login-error { background:#FFE5E5; color:var(--danger); padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none; }
.login-error.show { display:block; }
.login-footer { text-align:center; margin-top:24px; font-size:12px; color:var(--text-3); }
.login-footer a { color:var(--primary); text-decoration:none; font-weight:700; }

.admin-app { display:none; }
.admin-app.show { display:block; }
.topbar { background:white; padding:14px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:50; }
.topbar-brand { font-size:18px; font-weight:800; display:flex; align-items:center; gap:8px; }
.topbar-user { font-size:13px; color:var(--text-2); display:flex; align-items:center; gap:12px; }
.logout-btn { background:none; border:1.5px solid var(--border); padding:6px 12px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; color:var(--text); }
.logout-btn:hover { background:var(--bg); }
.view-site-btn { background:var(--accent); color:white; border:none; padding:6px 12px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; text-decoration:none; }

.tabs { background:white; padding:0 24px; border-bottom:1px solid var(--border); display:flex; gap:4px; overflow-x:auto; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { background:none; border:none; padding:14px 18px; font-size:14px; font-weight:700; color:var(--text-2); cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; transition:all .15s; }
.tab.active { color:var(--primary); border-bottom-color:var(--primary); }
.tab:hover { color:var(--text); }

.content { padding:24px; max-width:1200px; margin:0 auto; }
.section { display:none; }
.section.active { display:block; }
.section-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
.section-head h2 { font-size:24px; font-weight:800; }
.section-head .count { color:var(--text-2); font-size:14px; font-weight:500; margin-inline-start:8px; }
.add-btn { background:var(--primary); color:white; border:none; padding:10px 18px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
.add-btn:hover { background:var(--primary-dark); }

.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
.item-card { background:white; border-radius:12px; padding:14px; box-shadow:var(--shadow-sm); display:flex; gap:12px; }
.item-thumb { width:64px; height:64px; border-radius:10px; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:32px; flex-shrink:0; overflow:hidden; }
.item-thumb img { width:100%; height:100%; object-fit:cover; }
.item-body { flex:1; min-width:0; }
.item-title { font-size:14px; font-weight:700; margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.item-meta { font-size:12px; color:var(--text-2); display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
.item-actions { display:flex; gap:6px; }
.btn-mini { background:var(--bg); border:1px solid var(--border); padding:5px 10px; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; color:var(--text); }
.btn-mini.edit { color:var(--accent); }
.btn-mini.delete { color:var(--danger); }
.btn-mini:hover { background:var(--border); }

.badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; }
.badge-featured { background:#FFF3E0; color:var(--warning); }
.badge-discount { background:#FFE5E5; color:var(--danger); }
.badge-active { background:#E8F8ED; color:var(--success); }
.badge-expired { background:#F0F0F0; color:var(--text-3); }

.empty { text-align:center; padding:60px 20px; color:var(--text-2); }
.empty-icon { font-size:64px; margin-bottom:16px; }
.empty-title { font-size:18px; font-weight:700; margin-bottom:8px; color:var(--text); }
.empty-hint { font-size:14px; }

.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; overflow-y:auto; }
.modal-overlay.show { display:flex; }
.modal { background:white; border-radius:16px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; padding:24px; }
.modal-title { font-size:20px; font-weight:800; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }
.modal-close { background:none; border:none; font-size:24px; cursor:pointer; color:var(--text-3); }
.field { margin-bottom:14px; }
.field label { display:block; font-size:13px; font-weight:700; color:var(--text-2); margin-bottom:6px; }
.field input, .field select, .field textarea { width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; outline:none; transition:border-color .2s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color:var(--primary); }
.field textarea { resize:vertical; min-height:60px; }
.field-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.field-checkbox { display:flex; align-items:center; gap:8px; cursor:pointer; }
.field-checkbox input { width:auto; }
.field-checkbox label { margin:0; cursor:pointer; }
.field-hint { font-size:12px; color:var(--text-3); margin-top:4px; }
.color-input { display:flex; gap:8px; align-items:center; }
.color-input input[type="color"] { width:48px; padding:0; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; height:40px; }
.image-upload { border:2px dashed var(--border); border-radius:10px; padding:20px; text-align:center; cursor:pointer; transition:border-color .2s; display:block; }
.image-upload:hover { border-color:var(--primary); }
.image-upload input { display:none; }
.image-upload-icon { font-size:36px; margin-bottom:8px; }
.image-upload-text { font-size:13px; color:var(--text-2); }
.image-preview { margin-top:12px; position:relative; display:none; }
.image-preview.show { display:block; }
.image-preview img { width:100%; max-height:200px; object-fit:cover; border-radius:8px; }
.image-preview .remove-img { position:absolute; top:8px; right:8px; background:var(--danger); color:white; border:none; width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:16px; font-weight:800; }
.upload-progress { margin-top:8px; font-size:12px; color:var(--text-2); }
.modal-actions { display:flex; gap:10px; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }
.btn-cancel { flex:1; background:var(--bg); border:1.5px solid var(--border); color:var(--text); padding:12px; border-radius:8px; font-weight:700; cursor:pointer; }
.btn-cancel:hover { background:var(--border); }
.btn-save { flex:1; background:var(--primary); color:white; border:none; padding:12px; border-radius:8px; font-weight:800; cursor:pointer; }
.btn-save:hover { background:var(--primary-dark); }
.btn-save:disabled { opacity:.6; cursor:wait; }

.toast { position:fixed; top:24px; left:50%; transform:translateX(-50%); background:var(--text); color:white; padding:12px 20px; border-radius:10px; font-size:14px; font-weight:600; z-index:300; opacity:0; transition:opacity .3s; pointer-events:none; max-width:90%; }
.toast.show { opacity:1; }
.toast.error { background:var(--danger); }
.toast.success { background:var(--success); }

.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:24px; }
.stat-card { background:white; border-radius:12px; padding:18px; box-shadow:var(--shadow-sm); }
.stat-icon { font-size:28px; margin-bottom:6px; }
.stat-value { font-size:28px; font-weight:800; line-height:1; }
.stat-label { font-size:13px; color:var(--text-2); margin-top:4px; }

.seed-card { background:linear-gradient(135deg, #FDEEEF, #FFF5F6); border:2px solid var(--primary); border-radius:16px; padding:24px; margin-bottom:24px; position:relative; overflow:hidden; }
.seed-card::before { content:'🌱'; position:absolute; top:-20px; inset-inline-end:-20px; font-size:140px; opacity:.1; }
.seed-title { font-size:18px; font-weight:900; color:var(--primary); margin-bottom:6px; }
.seed-desc { font-size:14px; color:var(--text-2); line-height:1.6; margin-bottom:16px; max-width:600px; }
.seed-btn { background:var(--primary); color:white; border:none; padding:14px 28px; border-radius:10px; font-size:15px; font-weight:800; cursor:pointer; display:inline-flex; align-items:center; gap:8px; box-shadow:0 4px 12px rgba(193,39,45,.25); }
.seed-btn:hover { background:var(--primary-dark); transform:translateY(-1px); }
.seed-btn:disabled { opacity:.6; cursor:wait; }
.seed-note { font-size:12px; color:var(--text-3); margin-top:12px; }

.tips-card { background:white; border-radius:12px; padding:20px; box-shadow:var(--shadow-sm); }
.tips-card h3 { font-size:16px; font-weight:800; margin-bottom:12px; }
.tips-card p { color:var(--text-2); font-size:14px; line-height:1.6; }

/* Smart paste */
.smart-paste { background:linear-gradient(135deg,#FFF8E1,#FFF3CD); border:2px solid var(--secondary); border-radius:12px; padding:16px; margin-bottom:18px; }
.smart-paste-label { font-size:13px; font-weight:800; color:#7A5A00; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.smart-paste-row { display:flex; gap:8px; }
.smart-paste-row input { flex:1; padding:10px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:13px; outline:none; }
.smart-paste-row input:focus { border-color:var(--secondary); }
.smart-paste-row button { background:var(--secondary); color:white; border:none; padding:10px 18px; border-radius:8px; font-weight:800; cursor:pointer; white-space:nowrap; font-size:13px; }
.smart-paste-row button:hover { background:#B8890C; }
.smart-paste-row button:disabled { opacity:.6; cursor:wait; }
.smart-paste-hint { font-size:11px; color:#7A5A00; margin-top:6px; }
.smart-paste-status { font-size:12px; margin-top:8px; padding:8px 10px; border-radius:6px; display:none; }
.smart-paste-status.show { display:block; }
.smart-paste-status.success { background:#D4F4DD; color:#1B5E2E; }
.smart-paste-status.error { background:#FFE5E5; color:var(--danger); }

/* Store logo upload preview */
.logo-preview { display:flex; align-items:center; gap:12px; padding:10px; background:var(--bg); border-radius:8px; margin-top:8px; }
.logo-preview-img { width:48px; height:48px; border-radius:8px; object-fit:cover; background:white; }
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">⚙️</div>
    <div class="login-title">لوحة التحكم</div>
    <div class="login-subtitle">Admin · Promos Maroc 🇲🇦</div>
    <div class="login-error" id="login-error"></div>
    <form id="login-form">
      <div class="login-field">
        <label>Email</label>
        <input type="email" id="login-email" required autocomplete="email" placeholder="admin@example.com">
      </div>
      <div class="login-field">
        <label>كلمة المرور · Password</label>
        <input type="password" id="login-password" required autocomplete="current-password" placeholder="••••••••">
      </div>
      <button type="submit" class="login-btn" id="login-btn">دخول · Sign in</button>
    </form>
    <div class="login-footer">
      <a href="index.html">← العودة إلى الموقع</a>
    </div>
  </div>
</div>

<div class="admin-app" id="admin-app">
  <div class="topbar">
    <div class="topbar-brand">⚙️ Promos Maroc · Admin</div>
    <div class="topbar-user">
      <span id="user-email"></span>
      <a class="view-site-btn" href="index.html" target="_blank">🌐 View site</a>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="dashboard" onclick="showTab('dashboard')">📊 Dashboard</button>
    <button class="tab" data-tab="deals" onclick="showTab('deals')">🛍️ Deals</button>
    <button class="tab" data-tab="stores" onclick="showTab('stores')">🏪 Stores</button>
    <button class="tab" data-tab="categories" onclick="showTab('categories')">📂 Categories</button>
    <button class="tab" data-tab="promos" onclick="showTab('promos')">🎟️ Promo codes</button>
  </div>

  <div class="content">
    <div class="section active" id="section-dashboard">
      <div class="section-head"><h2>📊 Dashboard</h2></div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">🛍️</div><div class="stat-value" id="stat-deals">0</div><div class="stat-label">Total deals</div></div>
        <div class="stat-card"><div class="stat-icon">🏪</div><div class="stat-value" id="stat-stores">0</div><div class="stat-label">Stores</div></div>
      </div>
    </div>
    <div class="section" id="section-deals">
      <div class="section-head">
        <h2>🛍️ Deals <span class="count" id="count-deals">0</span></h2>
        <button class="add-btn" onclick="openDealForm()">+ Add deal</button>
      </div>
      <div id="deals-list" class="cards-grid"></div>
    </div>
    <div class="section" id="section-stores"><div class="section-head"><h2>🏪 Stores</h2><button class="add-btn" onclick="openStoreForm()">+ Add store</button></div><div id="stores-list" class="cards-grid"></div></div>
    <div class="section" id="section-categories"><div class="section-head"><h2>📂 Categories</h2><button class="add-btn" onclick="openCategoryForm()">+ Add category</button></div><div id="categories-list" class="cards-grid"></div></div>
    <div class="section" id="section-promos"><div class="section-head"><h2>🎟️ Promos</h2><button class="add-btn" onclick="openPromoForm()">+ Add promo</button></div><div id="promos-list" class="cards-grid"></div></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal-content"></div></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
// --- THE MASTER WORKER URL ---
const SCRAPER_URL = "https://promos-maroc-fetcher.abdelshafie-ahmed.workers.dev";

let db, auth, storage, currentUser;
let DEALS = [], STORES = [], CATEGORIES = [], PROMOS = [];
let pendingImageFile = null;

// Initialize Firebase
try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    auth = firebase.auth();
    storage = firebase.storage();
    auth.onAuthStateChanged(user => {
        if (user && user.email === ADMIN_EMAIL) {
            $('user-email').textContent = user.email;
            showAdmin();
            startListeners();
        } else {
            showLogin();
        }
    });
} catch (e) { console.error("Firebase Error:", e); }

function $(id) { return document.getElementById(id); }
function showLogin() { $('login-screen').style.display = 'flex'; $('admin-app').classList.remove('show'); }
function showAdmin() { $('login-screen').style.display = 'none'; $('admin-app').classList.add('show'); }
function doLogout() { auth.signOut(); }

function showTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'section-' + name));
}

function startListeners() {
    db.collection('deals').onSnapshot(snap => { DEALS = snap.docs.map(d => ({id:d.id, ...d.data()})); renderDeals(); });
    db.collection('stores').onSnapshot(snap => { STORES = snap.docs.map(d => ({id:d.id, ...d.data()})); renderStores(); });
    db.collection('categories').onSnapshot(snap => { CATEGORIES = snap.docs.map(d => ({id:d.id, ...d.data()})); });
    db.collection('promos').onSnapshot(snap => { PROMOS = snap.docs.map(d => ({id:d.id, ...d.data()})); });
}

function renderDeals() {
    $('count-deals').textContent = DEALS.length;
    $('deals-list').innerHTML = DEALS.map(d => `
        <div class="item-card">
            <div class="item-thumb">${d.imageUrl ? `<img src="${d.imageUrl}">` : '🛍️'}</div>
            <div class="item-body">
                <div class="item-title">${d.titleAr || d.title}</div>
                <div class="item-actions">
                    <button class="btn-mini edit" onclick="openDealForm('${d.id}')">Edit</button>
                    <button class="btn-mini delete" onclick="deleteItem('deals','${d.id}')">Delete</button>
                </div>
            </div>
        </div>
    `).join('');
}

// ... Additional render functions for Stores/Categories go here ...

function openDealForm(id) {
    const d = id ? DEALS.find(x => x.id === id) : { title:'', titleAr:'', old:0, new:0, disc:0, storeId:'', cat:'', expires:'' };
    showModal(`
        <div class="modal-title">🛍️ Deal Form</div>
        <div class="smart-paste">
            <div class="smart-paste-label">🪄 Smart Paste</div>
            <div class="smart-paste-row">
                <input type="url" id="sp-url" placeholder="Paste store URL here...">
                <button type="button" onclick="runSmartPaste()" id="sp-btn">Fetch</button>
            </div>
            <div id="sp-status" class="smart-paste-status"></div>
        </div>
        <form id="deal-form">
            <div class="field"><label>Title (FR)</label><input id="f-title" value="${d.title}"></div>
            <div class="field"><label>Title (AR)</label><input id="f-titleAr" value="${d.titleAr}"></div>
            <div class="field-row">
                <div class="field"><label>Old Price</label><input type="number" id="f-old" value="${d.old}"></div>
                <div class="field"><label>New Price</label><input type="number" id="f-new" value="${d.new}"></div>
            </div>
            <div class="field"><label>Store ID</label><input id="f-storeId" value="${d.storeId}"></div>
            <button type="submit" class="btn-save">Save Deal</button>
        </form>
    `);
}

async function runSmartPaste() {
    const url = $('sp-url').value.trim();
    if (!url) return;
    
    const btn = $('sp-btn');
    const status = $('sp-status');
    btn.disabled = true;
    status.textContent = "Connecting to Cloud Browser...";
    status.className = "smart-paste-status show success";

    try {
        const response = await window.fetch(SCRAPER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: url })
        });

        const data = await response.json();
        if (!data.success) throw new Error(data.error || "Fetch failed");

        // Simple Parser
        const parser = new DOMParser();
        const doc = parser.parseFromString(data.html, "text/html");
        
        $('f-title').value = doc.querySelector('h1')?.innerText || doc.title || "";
        const priceText = data.html.match(/([0-9]{1,5})[.,][0-9]{2}\s*DH/i);
        if (priceText) $('f-new').value = priceText[1];

        status.textContent = "✅ Data Captured!";
    } catch (err) {
        status.textContent = "❌ " + err.message;
        status.className = "smart-paste-status show error";
    } finally {
        btn.disabled = false;
    }
}

function showModal(html) { $('modal-content').innerHTML = html; $('modal-overlay').classList.add('show'); }
function closeModal() { $('modal-overlay').classList.remove('show'); }
function showToast(m, t) { const e = $('toast'); e.textContent = m; e.className = 'toast show ' + t; setTimeout(() => e.className = 'toast', 3000); }
</script>
