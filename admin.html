<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#C1272D">
<title>Admin · Promos Maroc</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23C1272D'/><text x='50' y='68' font-size='50' font-weight='900' text-anchor='middle' fill='white' font-family='system-ui'>⚙</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --primary:#C1272D; --primary-dark:#8B1A1F; --primary-soft:#FDEEEF; --secondary:#D4A017; --accent:#1B5E7A; --bg:#F5F5F7; --surface:#FFFFFF; --text:#1A1A1A; --text-2:#666; --text-3:#999; --border:#E5E5EA; --success:#27AE60; --danger:#E74C3C; --warning:#F39C12; --shadow-sm:0 1px 3px rgba(0,0,0,.06); --shadow-md:0 4px 12px rgba(0,0,0,.08); --shadow-lg:0 8px 24px rgba(0,0,0,.12); }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Tajawal','Cairo',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; }
button, input, select, textarea { font-family:inherit; }

.login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); }
.login-card { background:white; border-radius:20px; padding:40px 32px; width:100%; max-width:400px; box-shadow:var(--shadow-lg); }
.login-logo { font-size:64px; text-align:center; margin-bottom:16px; }
.login-title { font-size:24px; font-weight:800; text-align:center; margin-bottom:8px; }
.login-field { margin-bottom:16px; }
.login-field label { display:block; font-size:13px; font-weight:700; color:var(--text-2); margin-bottom:6px; }
.login-field input { width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:15px; outline:none; }
.login-btn { width:100%; background:var(--primary); color:white; border:none; padding:14px; border-radius:10px; font-size:16px; font-weight:800; cursor:pointer; }
.login-error { background:#FFE5E5; color:var(--danger); padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:none; }
.login-error.show { display:block; }

.admin-app { display:none; }
.admin-app.show { display:block; }
.topbar { background:white; padding:14px 24px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:50; }
.topbar-brand { font-size:18px; font-weight:800; }
.logout-btn { background:none; border:1.5px solid var(--border); padding:6px 12px; border-radius:8px; cursor:pointer; }

.tabs { background:white; padding:0 24px; border-bottom:1px solid var(--border); display:flex; gap:4px; overflow-x:auto; }
.tab { background:none; border:none; padding:14px 18px; font-size:14px; font-weight:700; color:var(--text-2); cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; }
.tab.active { color:var(--primary); border-bottom-color:var(--primary); }

.content { padding:24px; max-width:1200px; margin:0 auto; }
.section { display:none; }
.section.active { display:block; }
.section-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.add-btn { background:var(--primary); color:white; border:none; padding:10px 18px; border-radius:10px; font-weight:700; cursor:pointer; }

.cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
.item-card { background:white; border-radius:12px; padding:14px; box-shadow:var(--shadow-sm); display:flex; gap:12px; }
.item-thumb { width:64px; height:64px; border-radius:10px; background:var(--bg); display:flex; align-items:center; justify-content:center; overflow:hidden; }
.item-thumb img { width:100%; height:100%; object-fit:cover; }
.item-body { flex:1; min-width:0; }
.item-title { font-size:14px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.item-actions { display:flex; gap:6px; margin-top:8px; }
.btn-mini { background:var(--bg); border:1px solid var(--border); padding:5px 10px; border-radius:6px; font-size:12px; cursor:pointer; }

.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.show { display:flex; }
.modal { background:white; border-radius:16px; width:100%; max-width:560px; padding:24px; max-height:90vh; overflow-y:auto; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:12px; font-weight:700; margin-bottom:4px; color:var(--text-2); }
.field input, .field select { width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; }

.smart-paste { background:linear-gradient(135deg,#FFF8E1,#FFF3CD); border:2px solid var(--secondary); border-radius:12px; padding:16px; margin-bottom:18px; }
.smart-paste-row { display:flex; gap:8px; margin-top:8px; }
.smart-paste-row input { flex:1; padding:10px; border:1px solid var(--border); border-radius:8px; }
.smart-paste-row button { background:var(--secondary); color:white; border:none; padding:10px 18px; border-radius:8px; font-weight:800; cursor:pointer; }
.smart-paste-status { font-size:12px; margin-top:8px; display:none; }
.smart-paste-status.show { display:block; }
.smart-paste-status.success { color:var(--success); }
.smart-paste-status.error { color:var(--danger); }
.row-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.img-preview { margin-top:8px; min-height:0; }
.img-preview img { max-width:160px; max-height:160px; border-radius:8px; border:1px solid var(--border); }

/* Upload UI */
.upload-row { display:flex; gap:8px; align-items:stretch; margin-top:6px; }
.upload-row input[type="url"] { flex:1; }
.upload-btn { background:var(--accent); color:white; border:none; padding:0 14px; border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; white-space:nowrap; display:inline-flex; align-items:center; gap:4px; }
.upload-btn:disabled { opacity:0.6; cursor:not-allowed; }
.upload-progress { font-size:12px; color:var(--text-2); margin-top:6px; display:none; }
.upload-progress.show { display:block; }
.upload-progress-bar { width:100%; height:4px; background:var(--bg); border-radius:2px; margin-top:4px; overflow:hidden; }
.upload-progress-bar div { height:100%; background:var(--success); width:0%; transition:width 0.2s; }
.upload-or { text-align:center; font-size:11px; color:var(--text-3); margin:8px 0; text-transform:uppercase; letter-spacing:1px; }

/* Catalog cards */
.catalog-card { background:white; border-radius:12px; padding:14px; box-shadow:var(--shadow-sm); }
.catalog-card .pdf-icon { font-size:32px; margin-bottom:8px; }
.catalog-card .catalog-name { font-weight:700; font-size:14px; margin-bottom:4px; word-break:break-word; }
.catalog-card .catalog-meta { font-size:11px; color:var(--text-3); margin-bottom:8px; }
.catalog-card .catalog-actions { display:flex; gap:6px; }
.catalog-card a { color:var(--primary); text-decoration:none; font-weight:700; font-size:12px; }

.toast { position:fixed; top:24px; left:50%; transform:translateX(-50%); background:var(--text); color:white; padding:12px 24px; border-radius:10px; opacity:0; transition:0.3s; z-index:999; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">⚙️</div>
    <div class="login-title">Admin Login</div>
    <div class="login-error" id="login-error"></div>
    <form id="login-form">
      <div class="login-field"><label>Email</label><input type="email" id="login-email" required></div>
      <div class="login-field"><label>Password</label><input type="password" id="login-password" required></div>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>
</div>

<div class="admin-app" id="admin-app">
  <div class="topbar">
    <div class="topbar-brand">⚙️ Promos Maroc Admin</div>
    <div class="topbar-user"><span id="user-email"></span> <button onclick="auth.signOut()">Logout</button></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="dashboard" onclick="showTab('dashboard')">📊 Dashboard</button>
    <button class="tab" data-tab="deals" onclick="showTab('deals')">🛍️ Deals</button>
    <button class="tab" data-tab="stores" onclick="showTab('stores')">🏪 Stores</button>
    <button class="tab" data-tab="categories" onclick="showTab('categories')">📂 Categories</button>
    <button class="tab" data-tab="catalogs" onclick="showTab('catalogs')">📄 Catalogs</button>
  </div>

  <div class="content">
    <div class="section active" id="section-dashboard">
      <h2>📊 Stats</h2>
      <p>Deals: <strong id="stat-deals">0</strong></p>
      <p>Stores: <strong id="stat-stores">0</strong></p>
    </div>

    <div class="section" id="section-deals">
      <div class="section-head"><h2>🛍️ Deals</h2><button class="add-btn" onclick="openDealForm()">+ Add Deal</button></div>
      <div id="deals-list" class="cards-grid"></div>
    </div>

    <div class="section" id="section-stores">
      <div class="section-head"><h2>🏪 Stores</h2><button class="add-btn" onclick="openStoreForm()">+ Add Store</button></div>
      <div id="stores-list" class="cards-grid"></div>
    </div>

    <div class="section" id="section-categories">
      <div class="section-head"><h2>📂 Categories</h2><button class="add-btn" onclick="openCategoryForm()">+ Add Category</button></div>
      <div id="categories-list" class="cards-grid"></div>
    </div>

    <div class="section" id="section-catalogs">
      <div class="section-head"><h2>📄 Catalogs (PDF)</h2><button class="add-btn" onclick="openCatalogForm()">+ Upload Catalog</button></div>
      <p style="color:var(--text-2);font-size:13px;margin-bottom:16px">Upload promotional catalogs as PDFs (e.g. weekly Aswak flyer, Marjane Ramadan catalog).</p>
      <div id="catalogs-list" class="cards-grid"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal-content"></div></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
// The Engine URL
const WORKER_URL = "https://promos-maroc-fetcher.abdelshafie-ahmed.workers.dev";

let db, auth, storage;
let DEALS=[], STORES=[], CATEGORIES=[], CATALOGS=[];

try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    auth = firebase.auth();
    storage = firebase.storage();
    
    auth.onAuthStateChanged(user => {
        if (user && user.email === ADMIN_EMAIL) {
            document.getElementById('user-email').textContent = user.email;
            document.getElementById('admin-app').classList.add('show');
            document.getElementById('login-screen').style.display = 'none';
            startListeners();
        } else {
            document.getElementById('admin-app').classList.remove('show');
            document.getElementById('login-screen').style.display = 'flex';
        }
    });
} catch (e) { console.error("Firebase Init Failed", e); }

function $(id) { return document.getElementById(id); }

function showTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'section-' + name));
}

function startListeners() {
    db.collection('deals').onSnapshot(snap => { DEALS = snap.docs.map(d => ({id:d.id, ...d.data()})); renderDeals(); });
    db.collection('stores').onSnapshot(snap => { STORES = snap.docs.map(d => ({id:d.id, ...d.data()})); renderStores(); });
    db.collection('categories').onSnapshot(snap => { CATEGORIES = snap.docs.map(d => ({id:d.id, ...d.data()})); renderCategories(); });
    db.collection('catalogs').orderBy('createdAt', 'desc').onSnapshot(snap => { CATALOGS = snap.docs.map(d => ({id:d.id, ...d.data()})); renderCatalogs(); });
}

function renderDeals() {
    $('stat-deals').textContent = DEALS.length;
    $('deals-list').innerHTML = DEALS.map(d => `
        <div class="item-card">
            <div class="item-thumb">${d.imageUrl ? `<img src="${d.imageUrl}" onerror="this.parentElement.innerHTML='🛍️'">` : '🛍️'}</div>
            <div class="item-body">
                <div class="item-title">${d.title || d.titleEn || d.titleAr || '(untitled)'}</div>
                <div style="font-size:12px;color:var(--text-2);margin-top:2px">
                    ${d.new ? `<strong style="color:var(--primary)">${d.new} DH</strong>` : ''}
                    ${d.old && d.old > d.new ? `<span style="text-decoration:line-through;margin-left:6px">${d.old} DH</span>` : ''}
                    ${d.disc ? `<span style="background:var(--success);color:white;padding:1px 6px;border-radius:4px;margin-left:6px;font-size:11px">-${d.disc}%</span>` : ''}
                </div>
                <div class="item-actions">
                    <button class="btn-mini" onclick="openDealForm('${d.id}')">Edit</button>
                    <button class="btn-mini" onclick="deleteItem('deals','${d.id}')">Delete</button>
                </div>
            </div>
        </div>`).join('');
}

function renderStores() {
    $('stat-stores').textContent = STORES.length;
    $('stores-list').innerHTML = STORES.map(s => `
        <div class="item-card">
            <div class="item-thumb" style="background:${s.color}">${s.logoUrl ? `<img src="${s.logoUrl}">` : s.name.charAt(0)}</div>
            <div class="item-body">
                <div class="item-title">${s.name}</div>
                <button class="btn-mini" onclick="deleteItem('stores','${s.id}')">Delete</button>
            </div>
        </div>`).join('');
}

function renderCategories() {
    $('categories-list').innerHTML = CATEGORIES.map(c => `
        <div class="item-card">
            <div class="item-thumb">${c.imageUrl ? `<img src="${c.imageUrl}" onerror="this.parentElement.textContent='📂'">` : (c.icon || '📂')}</div>
            <div class="item-body">
                <div class="item-title">${c.fr || ''}</div>
                <div style="font-size:11px;color:var(--text-3)">${c.en || ''}</div>
                <div class="item-actions">
                    <button class="btn-mini" onclick="deleteItem('categories','${c.id}')">Delete</button>
                </div>
            </div>
        </div>`).join('');
}

function openDealForm(id) {
    const d = id ? DEALS.find(x => x.id === id) : { title:'', titleEn:'', old:0, new:0, disc:0, storeId:'', cat:'', imageUrl:'', sourceUrl:'' };
    showModal(`
        <h3>🛍️ Deal Details</h3>
        <div class="smart-paste">
            <strong>🪄 Smart Paste</strong>
            <div class="smart-paste-row">
                <input type="url" id="sp-url" placeholder="Paste product URL...">
                <button type="button" onclick="runScraper()" id="sp-btn">Fetch</button>
            </div>
            <div id="sp-status" class="smart-paste-status"></div>
        </div>
        <form id="deal-form">
            <div class="field"><label>Title (FR)</label><input id="f-title" value="${esc(d.title)}"></div>
            <div class="field"><label>Title (EN) <span style="color:#999;font-weight:400">— optional</span></label><input id="f-titleEn" value="${esc(d.titleEn || d.titleAr || '')}"></div>
            <div class="row-2">
                <div class="field"><label>New Price (DH)</label><input type="number" step="0.01" id="f-new" value="${d.new || ''}"></div>
                <div class="field"><label>Old Price (DH)</label><input type="number" step="0.01" id="f-old" value="${d.old || ''}"></div>
            </div>
            <div class="field"><label>Discount (%)</label><input type="number" id="f-disc" value="${d.disc || ''}" placeholder="auto-calculated if empty"></div>
            <div class="field">
                <label>Image</label>
                <div class="upload-row">
                    <input type="url" id="f-imageUrl" value="${esc(d.imageUrl || '')}" placeholder="Paste URL or upload below">
                    <button type="button" class="upload-btn" id="f-img-upload-btn">📤 Upload</button>
                </div>
                <input type="file" id="f-img-file-input" style="display:none">
                <div id="f-img-upload-progress" class="upload-progress"></div>
                <div id="img-preview" class="img-preview">${d.imageUrl ? `<img src="${esc(d.imageUrl)}">` : ''}</div>
            </div>
            <div class="field"><label>Source URL <span style="color:#999;font-weight:400">— optional</span></label><input type="url" id="f-sourceUrl" value="${esc(d.sourceUrl || '')}"></div>
            <div class="field"><label>Store</label>
                <select id="f-storeId">
                    <option value="">— Select store —</option>
                    ${STORES.map(s => `<option value="${s.id}" ${d.storeId === s.id ? 'selected' : ''}>${esc(s.name)}</option>`).join('')}
                </select>
            </div>
            <div class="field"><label>Category</label>
                <select id="f-cat">
                    <option value="">— Select category —</option>
                    ${CATEGORIES.map(c => `<option value="${c.id}" ${d.cat === c.id ? 'selected' : ''}>${esc(c.fr || c.id)}</option>`).join('')}
                </select>
            </div>
            <button type="submit" class="login-btn">Save Deal</button>
        </form>
    `);
    // Live image preview
    $('f-imageUrl').oninput = () => {
        const url = $('f-imageUrl').value.trim();
        $('img-preview').innerHTML = url ? `<img src="${url}" onerror="this.style.display='none'">` : '';
    };
    // Image file upload
    wireUpload('f-img-upload-btn', 'f-img-file-input', 'f-img-upload-progress', 'f-imageUrl', 'img-preview', 'deals', 'image/*');
    // Save handler
    $('deal-form').onsubmit = async (e) => {
        e.preventDefault();
        const newPrice = parseFloat($('f-new').value) || 0;
        const oldPrice = parseFloat($('f-old').value) || 0;
        let disc = parseInt($('f-disc').value, 10);
        if (!disc && oldPrice > newPrice && oldPrice > 0) {
            disc = Math.round((1 - newPrice / oldPrice) * 100);
        }
        const data = {
            title: $('f-title').value.trim(),
            titleEn: $('f-titleEn').value.trim(),
            new: newPrice,
            old: oldPrice,
            disc: disc || 0,
            imageUrl: $('f-imageUrl').value.trim(),
            sourceUrl: $('f-sourceUrl').value.trim(),
            storeId: $('f-storeId').value,
            cat: $('f-cat').value,
            updatedAt: new Date()
        };
        try {
            if (id) {
                await db.collection('deals').doc(id).update(data);
            } else {
                data.createdAt = new Date();
                await db.collection('deals').add(data);
            }
            $('modal-overlay').classList.remove('show');
            showToast(id ? 'Deal updated' : 'Deal added');
        } catch(err) { alert('Save failed: ' + err.message); }
    };
}

function esc(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function openStoreForm() {
    showModal(`
        <h3>🏪 Add Store</h3>
        <form id="store-form">
            <div class="field"><label>Name</label><input id="s-name" required></div>
            <div class="field"><label>Color (hex)</label><input id="s-color" value="#C1272D"></div>
            <div class="field">
                <label>Logo</label>
                <div class="upload-row">
                    <input type="url" id="s-logo" placeholder="Paste URL or upload below">
                    <button type="button" class="upload-btn" id="s-logo-upload-btn">📤 Upload</button>
                </div>
                <input type="file" id="s-logo-file-input" style="display:none">
                <div id="s-logo-upload-progress" class="upload-progress"></div>
                <div id="store-img-preview" class="img-preview"></div>
            </div>
            <button type="submit" class="login-btn">Save Store</button>
        </form>
    `);
    $('s-logo').oninput = () => {
        const url = $('s-logo').value.trim();
        $('store-img-preview').innerHTML = url ? `<img src="${url}" onerror="this.style.display='none'">` : '';
    };
    wireUpload('s-logo-upload-btn', 's-logo-file-input', 's-logo-upload-progress', 's-logo', 'store-img-preview', 'stores', 'image/*');
    $('store-form').onsubmit = async (e) => {
        e.preventDefault();
        try {
            await db.collection('stores').add({
                name: $('s-name').value.trim(),
                color: $('s-color').value.trim(),
                logoUrl: $('s-logo').value.trim(),
                createdAt: new Date()
            });
            $('modal-overlay').classList.remove('show');
            showToast('Store added');
        } catch(err) { alert('Save failed: ' + err.message); }
    };
}

function openCategoryForm() {
    showModal(`
        <h3>📂 Add Category</h3>
        <form id="cat-form">
            <div class="field"><label>Name (FR)</label><input id="c-fr" required></div>
            <div class="field"><label>Name (EN)</label><input id="c-en"></div>
            <div class="field">
                <label>Image</label>
                <div class="upload-row">
                    <input id="c-img" type="url" placeholder="Paste URL or upload below">
                    <button type="button" class="upload-btn" id="c-img-upload-btn">📤 Upload</button>
                </div>
                <input type="file" id="c-img-file-input" style="display:none">
                <div id="c-img-upload-progress" class="upload-progress"></div>
                <div id="cat-img-preview" class="img-preview"></div>
            </div>
            <div class="field"><label>Keywords (comma-separated, for auto-categorize)</label><input id="c-kw" placeholder="e.g. seche-cheveux, hygiene, beaute"></div>
            <button type="submit" class="login-btn">Save Category</button>
        </form>
    `);
    $('c-img').oninput = () => {
        const url = $('c-img').value.trim();
        $('cat-img-preview').innerHTML = url ? `<img src="${url}" onerror="this.style.display='none'">` : '';
    };
    wireUpload('c-img-upload-btn', 'c-img-file-input', 'c-img-upload-progress', 'c-img', 'cat-img-preview', 'categories', 'image/*');
    $('cat-form').onsubmit = async (e) => {
        e.preventDefault();
        try {
            await db.collection('categories').add({
                fr: $('c-fr').value.trim(),
                en: $('c-en').value.trim(),
                imageUrl: $('c-img').value.trim(),
                keywords: $('c-kw').value.split(',').map(k => k.trim().toLowerCase()).filter(Boolean),
                createdAt: new Date()
            });
            $('modal-overlay').classList.remove('show');
            showToast('Category added');
        } catch(err) { alert('Save failed: ' + err.message); }
    };
}

// --- BULLETPROOF SCRAPER ---
async function runScraper() {
    const targetUrl = $('sp-url').value.trim();
    if (!targetUrl) return;

    const btn = $('sp-btn');
    const status = $('sp-status');
    
    btn.disabled = true;
    status.textContent = "⏳ Connecting to Cloud Browser…";
    status.className = "smart-paste-status show";

    try {
        const response = await window.fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: targetUrl })
        });

        const data = await response.json();
        if (!data.success) throw new Error(data.error || "Scraper Error");

        const parser = new DOMParser();
        const doc = parser.parseFromString(data.html, "text/html");
        const html = data.html;
        const domain = new URL(targetUrl).hostname.toLowerCase();

        let title = '', newPrice = '', oldPrice = '', disc = '', img = '';
        let categoryGuess = '';

        // Helpers shared across all stores
        const grabMeta = (sel) => doc.querySelector(sel)?.getAttribute('content') || '';
        const ogImage = grabMeta('meta[property="og:image"]')
                     || grabMeta('meta[name="og:image"]')
                     || grabMeta('meta[property="twitter:image"]')
                     || grabMeta('meta[name="twitter:image"]');
        const ogTitle = grabMeta('meta[property="og:title"]') || grabMeta('meta[name="og:title"]');

        // French price markers used by many Moroccan e-commerce sites (WooCommerce, Magento FR)
        const findOld = () => {
            const m = html.match(/prix initial[^0-9]*([0-9][0-9\s.]*[,.]?[0-9]{0,2})\s*(?:Dh|DH|MAD)/i)
                  || html.match(/(?:Ancien|Old)\s*prix[^0-9]*([0-9][0-9\s.]*[,.]?[0-9]{0,2})\s*(?:Dh|DH|MAD)/i);
            return m ? m[1].replace(/\s/g, '').replace(',', '.') : '';
        };
        const findNew = () => {
            const m = html.match(/prix actuel[^0-9]*([0-9][0-9\s.]*[,.]?[0-9]{0,2})\s*(?:Dh|DH|MAD)/i)
                  || html.match(/(?:Nouveau|New)\s*prix[^0-9]*([0-9][0-9\s.]*[,.]?[0-9]{0,2})\s*(?:Dh|DH|MAD)/i);
            return m ? m[1].replace(/\s/g, '').replace(',', '.') : '';
        };

        // Smart image picker — finds the largest reasonable product image on a page.
        // Skips logos, social icons, tracking pixels.
        const findBestImage = () => {
            if (ogImage && !ogImage.includes('logo')) return ogImage;
            const imgs = Array.from(doc.querySelectorAll('img'));
            const scored = imgs.map(el => {
                const src = el.getAttribute('src') || el.getAttribute('data-src') || el.getAttribute('data-original') || '';
                if (!src || src.startsWith('data:')) return null;
                const lower = src.toLowerCase();
                // Reject obvious non-product images
                if (/logo|icon|sprite|pixel|tracker|social|footer|header|placeholder|favicon|loader/.test(lower)) return null;
                // Reject very small images (under 200px in either dimension)
                const w = parseInt(el.getAttribute('width') || el.naturalWidth || 0, 10);
                const h = parseInt(el.getAttribute('height') || el.naturalHeight || 0, 10);
                if (w && w < 200) return null;
                if (h && h < 200) return null;
                // Score by class/id hints
                let score = 0;
                const cls = (el.className || '').toString().toLowerCase();
                const id = (el.id || '').toLowerCase();
                if (/product|gallery|main|primary|fotorama|zoom|featured/.test(cls + id)) score += 10;
                if (cls.includes('thumb') || id.includes('thumb')) score -= 3;
                if (w * h) score += Math.min(5, Math.log10(w * h));
                return { src, score };
            }).filter(Boolean);
            scored.sort((a, b) => b.score - a.score);
            // Resolve relative URLs against the page URL
            if (scored.length) {
                try { return new URL(scored[0].src, targetUrl).href; }
                catch { return scored[0].src; }
            }
            return ogImage || '';
        };

        if (domain.includes('aswakassalam')) {
            // -------- ASWAK ASSALAM (WooCommerce) --------
            title = doc.querySelector('.product_title')?.innerText
                 || doc.querySelector('h1.entry-title')?.innerText
                 || doc.querySelector('h1')?.innerText
                 || '';

            oldPrice = findOld();
            newPrice = findNew();

            if (!newPrice) {
                const single = doc.querySelector('p.price .woocommerce-Price-amount bdi')
                            || doc.querySelector('.price .woocommerce-Price-amount bdi')
                            || doc.querySelector('.woocommerce-Price-amount bdi');
                if (single) newPrice = single.innerText.replace(/[^0-9.,]/g, '').replace(',', '.');
            }

            const dm = html.match(/-\s*([0-9]{1,2})\s*%/);
            if (dm) disc = dm[1];

            img = ogImage
               || doc.querySelector('.woocommerce-product-gallery__image img')?.getAttribute('src')
               || doc.querySelector('.wp-post-image')?.getAttribute('src')
               || findBestImage();

            const catLinks = Array.from(doc.querySelectorAll('a[href*="product-category"]'));
            if (catLinks.length) categoryGuess = catLinks[0].innerText.trim();

        } else if (domain.includes('electroplanet')) {
            // -------- ELECTROPLANET (Magento 2) --------
            title = doc.querySelector('h1.page-title span')?.innerText
                 || doc.querySelector('h1.page-title')?.innerText
                 || doc.querySelector('h1')?.innerText
                 || ogTitle;

            // Magento standard price selectors
            const oldEl = doc.querySelector('[data-price-type="oldPrice"] .price')
                       || doc.querySelector('.old-price .price')
                       || doc.querySelector('span.old-price');
            const newEl = doc.querySelector('[data-price-type="finalPrice"] .price')
                       || doc.querySelector('.special-price .price')
                       || doc.querySelector('[data-price-type="finalPrice"]')
                       || doc.querySelector('.price-wrapper .price');
            if (oldEl) oldPrice = oldEl.innerText.replace(/[^0-9.,]/g, '').replace(/\s/g, '').replace(',', '.');
            if (newEl) newPrice = newEl.innerText.replace(/[^0-9.,]/g, '').replace(/\s/g, '').replace(',', '.');

            // Magento often embeds a JSON gallery in a script tag; fall back to smart image picker
            const galleryImg = doc.querySelector('.fotorama__img')?.getAttribute('src')
                            || doc.querySelector('.gallery-placeholder img')?.getAttribute('src')
                            || doc.querySelector('img.product-image-photo')?.getAttribute('src');
            img = galleryImg || ogImage || findBestImage();

            // Pull category from breadcrumbs
            const crumbs = Array.from(doc.querySelectorAll('.breadcrumbs a, nav.breadcrumb a'));
            if (crumbs.length > 1) categoryGuess = crumbs[crumbs.length - 1].innerText.trim();

            // Discount badge — Magento uses "-XX%" labels but format varies
            const dm = html.match(/-\s*([0-9]{1,2})\s*%/);
            if (dm) disc = dm[1];

        } else {
            // -------- GENERIC FALLBACK --------
            title = doc.querySelector('h1')?.innerText || ogTitle || doc.title;

            // Try French markers first, then any DH-suffixed number
            oldPrice = findOld();
            newPrice = findNew();
            if (!newPrice) {
                const m = html.match(/([0-9]{1,5}(?:[\s.][0-9]{3})*[,.]?[0-9]{0,2})\s*(?:DH|Dh|MAD|درهم)/);
                if (m) newPrice = m[1].replace(/\s/g, '').replace(',', '.');
            }

            const dm = html.match(/-\s*([0-9]{1,2})\s*%/);
            if (dm) disc = dm[1];

            img = findBestImage();
        }

        // Auto-calc discount if we have both prices and no explicit %
        if (!disc && oldPrice && newPrice && parseFloat(oldPrice) > parseFloat(newPrice)) {
            disc = Math.round((1 - parseFloat(newPrice) / parseFloat(oldPrice)) * 100).toString();
        }

        // Auto-categorize against existing categories' keywords
        const titleLower = title.toLowerCase();
        const catGuessLower = categoryGuess.toLowerCase();
        let matchedCatId = '';
        for (const c of CATEGORIES) {
            const kws = (c.keywords || []).map(k => k.toLowerCase());
            if (!kws.length) continue;
            if (kws.some(k => titleLower.includes(k) || catGuessLower.includes(k))) {
                matchedCatId = c.id;
                break;
            }
        }

        // Fill the form
        if (title) $('f-title').value = title.trim();
        if (newPrice) $('f-new').value = newPrice;
        if (oldPrice) $('f-old').value = oldPrice;
        if (disc) $('f-disc').value = disc;
        if (img) {
            $('f-imageUrl').value = img;
            $('img-preview').innerHTML = `<img src="${img}" onerror="this.style.display='none'">`;
        }
        $('f-sourceUrl').value = targetUrl;
        if (matchedCatId) $('f-cat').value = matchedCatId;

        const filled = [title && 'title', newPrice && 'price', img && 'image'].filter(Boolean);
        if (filled.length) {
            status.textContent = `✅ Got: ${filled.join(', ')}${matchedCatId ? ' · category auto-matched' : ''}`;
            status.className = "smart-paste-status show success";
        } else {
            status.textContent = "⚠️ Page loaded but no fields extracted — fill manually";
            status.className = "smart-paste-status show error";
        }
    } catch (err) {
        status.textContent = "❌ " + err.message;
        status.className = "smart-paste-status show error";
    } finally {
        btn.disabled = false;
    }
}

// ============================================================
// FILE UPLOAD HELPER (Firebase Storage)
// ============================================================
// uploadFile(file, folder, onProgress) -> returns download URL
async function uploadFile(file, folder, onProgress) {
    if (!storage) throw new Error("Firebase Storage not initialized");
    if (!file) throw new Error("No file selected");
    
    // Sanitize filename, prepend timestamp to avoid collisions
    const clean = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const path = `${folder}/${Date.now()}_${clean}`;
    const ref = storage.ref(path);
    
    return new Promise((resolve, reject) => {
        const task = ref.put(file);
        task.on('state_changed',
            (snap) => {
                const pct = (snap.bytesTransferred / snap.totalBytes) * 100;
                if (onProgress) onProgress(pct);
            },
            (err) => reject(err),
            async () => {
                try {
                    const url = await task.snapshot.ref.getDownloadURL();
                    resolve({ url, path, size: file.size, name: file.name, type: file.type });
                } catch(e) { reject(e); }
            }
        );
    });
}

// Wires up an upload button + hidden file input to fill a target URL field.
// targetInputId: id of the URL <input> to populate
// previewId: id of the preview <div> (optional)
// folder: storage folder name (e.g. 'deals', 'stores')
// accept: file accept attribute (e.g. 'image/*', 'application/pdf')
function wireUpload(buttonId, fileInputId, progressId, targetInputId, previewId, folder, accept) {
    const btn = $(buttonId);
    const file = $(fileInputId);
    const progress = $(progressId);
    if (!btn || !file) return;
    
    file.accept = accept;
    btn.onclick = () => file.click();
    file.onchange = async () => {
        const f = file.files[0];
        if (!f) return;
        // Sanity check size: 10MB image cap, 25MB PDF cap
        const maxMB = accept.includes('pdf') ? 25 : 10;
        if (f.size > maxMB * 1024 * 1024) {
            alert(`File too large. Max ${maxMB}MB.`);
            file.value = '';
            return;
        }
        btn.disabled = true;
        progress.classList.add('show');
        progress.innerHTML = `Uploading… <div class="upload-progress-bar"><div id="${progressId}-bar"></div></div>`;
        try {
            const result = await uploadFile(f, folder, (pct) => {
                const bar = $(`${progressId}-bar`);
                if (bar) bar.style.width = pct + '%';
            });
            if (targetInputId) {
                $(targetInputId).value = result.url;
                $(targetInputId).dispatchEvent(new Event('input')); // trigger preview
            }
            progress.innerHTML = `✅ Uploaded (${(f.size/1024).toFixed(0)} KB)`;
            // Return result for catalog form etc.
            file._lastUpload = result;
        } catch(err) {
            progress.innerHTML = `❌ ${err.message || 'Upload failed'}`;
            progress.style.color = 'var(--danger)';
        } finally {
            btn.disabled = false;
        }
    };
}

// ============================================================
function renderCatalogs() {
    const list = $('catalogs-list');
    if (!list) return;
    list.innerHTML = CATALOGS.map(c => `
        <div class="catalog-card">
            <div class="pdf-icon">📄</div>
            <div class="catalog-name">${esc(c.title || c.fileName || 'Untitled')}</div>
            <div class="catalog-meta">
                ${c.storeName ? esc(c.storeName) + ' · ' : ''}
                ${c.size ? (c.size/1024/1024).toFixed(1) + ' MB · ' : ''}
                ${c.createdAt && c.createdAt.toDate ? c.createdAt.toDate().toLocaleDateString() : ''}
            </div>
            <div class="catalog-actions">
                <a href="${esc(c.fileUrl)}" target="_blank" rel="noopener">📥 View PDF</a>
                <button class="btn-mini" onclick="deleteItem('catalogs','${c.id}')" style="margin-left:auto">Delete</button>
            </div>
        </div>`).join('') || '<p style="color:var(--text-3);grid-column:1/-1;text-align:center;padding:40px">No catalogs uploaded yet.</p>';
}

function openCatalogForm() {
    showModal(`
        <h3>📄 Upload Catalog (PDF)</h3>
        <form id="catalog-form">
            <div class="field"><label>Title</label><input id="cat-title" placeholder="e.g. Aswak weekly flyer — April 2026" required></div>
            <div class="field"><label>Store (optional)</label>
                <select id="cat-store">
                    <option value="">— None —</option>
                    ${STORES.map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('')}
                </select>
            </div>
            <div class="field">
                <label>PDF File</label>
                <div class="upload-row">
                    <input type="url" id="cat-fileUrl" placeholder="No file uploaded yet" readonly style="background:#f5f5f7">
                    <button type="button" class="upload-btn" id="cat-upload-btn">📤 Upload</button>
                </div>
                <input type="file" id="cat-file-input" style="display:none">
                <div id="cat-upload-progress" class="upload-progress"></div>
            </div>
            <div class="field"><label>Valid until (optional)</label><input type="date" id="cat-validUntil"></div>
            <button type="submit" class="login-btn">Save Catalog</button>
        </form>
    `);
    wireUpload('cat-upload-btn', 'cat-file-input', 'cat-upload-progress', 'cat-fileUrl', null, 'catalogs', 'application/pdf');
    $('catalog-form').onsubmit = async (e) => {
        e.preventDefault();
        const fileInput = $('cat-file-input');
        const upload = fileInput._lastUpload;
        if (!upload || !upload.url) { alert("Please upload a PDF first."); return; }
        const storeId = $('cat-store').value;
        const store = STORES.find(s => s.id === storeId);
        try {
            await db.collection('catalogs').add({
                title: $('cat-title').value.trim(),
                storeId: storeId || null,
                storeName: store ? store.name : null,
                fileUrl: upload.url,
                filePath: upload.path,
                fileName: upload.name,
                size: upload.size,
                validUntil: $('cat-validUntil').value || null,
                createdAt: new Date()
            });
            $('modal-overlay').classList.remove('show');
            showToast('Catalog uploaded');
        } catch(err) { alert('Save failed: ' + err.message); }
    };
}
