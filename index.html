<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="أفضل العروض والتخفيضات في المغرب - مرجان، كارفور، بيم، جوميا وأكثر">
<meta name="theme-color" content="#C1272D">
<title>Promos Maroc - أفضل العروض في المغرب 🇲🇦</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23C1272D'/><text x='50' y='68' font-size='52' font-weight='900' text-anchor='middle' fill='white' font-family='system-ui'>PM</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary:#C1272D; --primary-dark:#8B1A1F; --primary-light:#E84C52; --primary-soft:#FDEEEF;
  --secondary:#D4A017; --secondary-light:#F2C94C;
  --accent:#1B5E7A; --accent-light:#2E7D99;
  --bg:#FAF8F5; --surface:#FFFFFF; --surface-alt:#F5F0E8;
  --text:#1A1A1A; --text-2:#4A4A4A; --text-3:#858585;
  --border:#EAE6DF; --border-light:#F0ECE5;
  --success:#27AE60; --danger:#E74C3C; --warning:#F39C12;
  --shadow-xs:0 1px 2px rgba(139,26,31,.04);
  --shadow-sm:0 1px 3px rgba(139,26,31,.08), 0 1px 2px rgba(0,0,0,.03);
  --shadow-md:0 4px 12px rgba(139,26,31,.1), 0 2px 6px rgba(0,0,0,.04);
  --shadow-lg:0 12px 28px rgba(139,26,31,.14), 0 4px 12px rgba(0,0,0,.06);
  --shadow-xl:0 20px 48px rgba(139,26,31,.18);
  --radius-sm:8px; --radius-md:12px; --radius-lg:16px; --radius-xl:20px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }
body { font-family:'Tajawal','Cairo',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; overflow-x:hidden; }
body[dir="ltr"] { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
a { color:inherit; text-decoration:none; }
button { font-family:inherit; }

/* ==================== LOGO ==================== */
.pm-logo { display:inline-flex; align-items:center; gap:10px; }
.pm-logo-mark { width:40px; height:40px; position:relative; flex-shrink:0; }
.pm-logo-text { display:flex; flex-direction:column; line-height:1; }
.pm-logo-text .brand { font-size:16px; font-weight:900; letter-spacing:.3px; }
.pm-logo-text .tag { font-size:10px; opacity:.75; font-weight:600; margin-top:2px; }

/* ==================== DESKTOP LAYOUT ==================== */
.shell { display:flex; min-height:100vh; max-width:1400px; margin:0 auto; }

/* Sidebar (desktop only) */
.sidebar { display:none; width:240px; background:var(--surface); border-inline-end:1px solid var(--border); padding:20px 0; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto; flex-shrink:0; }
.sidebar-logo { padding:0 20px 24px; border-bottom:1px solid var(--border-light); margin-bottom:12px; }
.sidebar-nav { display:flex; flex-direction:column; gap:2px; padding:0 12px; }
.sidebar-item { display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:10px; cursor:pointer; color:var(--text-2); font-weight:600; transition:all .15s; background:none; border:none; text-align:start; font-size:14px; width:100%; }
.sidebar-item:hover { background:var(--surface-alt); color:var(--text); }
.sidebar-item.active { background:var(--primary-soft); color:var(--primary); }
.sidebar-item .si-icon { font-size:20px; }
.sidebar-footer { margin-top:auto; padding:16px 20px; border-top:1px solid var(--border-light); font-size:12px; color:var(--text-3); text-align:center; }
.sidebar-lang { background:var(--surface-alt); border:none; color:var(--text); padding:8px 14px; border-radius:20px; font-weight:700; cursor:pointer; font-size:13px; margin:12px 20px; }
.sidebar-lang:hover { background:var(--border); }

/* Main content */
.main { flex:1; min-width:0; padding-bottom:80px; }
.app { max-width:480px; margin:0 auto; background:var(--bg); min-height:100vh; position:relative; }

/* ==================== HEADER ==================== */
.header { background:linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); padding:20px 20px 28px; color:white; border-radius:0 0 24px 24px; position:relative; overflow:hidden; }
.header::before { content:''; position:absolute; top:-40px; inset-inline-end:-40px; width:180px; height:180px; border-radius:50%; background:radial-gradient(circle, rgba(212,160,23,.15) 0%, transparent 70%); }
.header::after { content:'✦'; position:absolute; bottom:-20px; inset-inline-start:-10px; color:rgba(255,255,255,.06); font-size:140px; line-height:1; }
.header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; position:relative; z-index:1; }
.header-logo .pm-logo-text .brand { color:white; font-size:18px; }
.header-logo .pm-logo-text .tag { color:rgba(255,255,255,.8); }
.lang-toggle { background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.15); color:white; padding:8px 14px; border-radius:20px; font-weight:700; cursor:pointer; font-size:13px; backdrop-filter:blur(10px); transition:background .15s; }
.lang-toggle:hover { background:rgba(255,255,255,.3); }
.greeting-section { position:relative; z-index:1; margin-bottom:18px; }
.greeting { font-size:13px; opacity:.9; margin-bottom:2px; }
.location { font-size:15px; font-weight:700; display:flex; align-items:center; gap:6px; }
.tagline { font-size:24px; font-weight:900; margin-bottom:16px; line-height:1.25; position:relative; z-index:1; max-width:90%; }
.search-bar { background:white; border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:10px; box-shadow:0 8px 24px rgba(139,26,31,.25); cursor:pointer; position:relative; z-index:1; transition:transform .15s; }
.search-bar:hover { transform:translateY(-2px); }
.search-bar input { flex:1; border:none; outline:none; font-size:14px; font-family:inherit; background:transparent; color:var(--text); }
.search-bar input::placeholder { color:var(--text-3); }
.search-bar .search-icon { font-size:18px; }

/* ==================== QUICK LINKS ==================== */
.quick-links { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:20px 16px 8px; }
.quick-link { text-align:center; cursor:pointer; padding:10px 4px; border-radius:var(--radius-md); transition:background .15s; background:none; border:none; }
.quick-link:hover { background:var(--primary-soft); }
.quick-link-icon { width:54px; height:54px; background:white; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 6px; font-size:22px; box-shadow:var(--shadow-sm); transition:transform .15s; }
.quick-link:hover .quick-link-icon { transform:scale(1.1) rotate(-3deg); }
.quick-link-label { font-size:11px; font-weight:700; color:var(--text); line-height:1.2; }

/* ==================== SECTIONS ==================== */
.section-header { display:flex; justify-content:space-between; align-items:center; padding:22px 20px 12px; }
.section-title { font-size:19px; font-weight:800; color:var(--text); display:flex; align-items:center; gap:6px; }
.section-subtitle { font-size:12px; color:var(--text-2); margin-top:2px; }
.see-all { color:var(--primary); font-size:13px; font-weight:700; cursor:pointer; background:none; border:none; padding:4px 0; }
.see-all:hover { text-decoration:underline; }

.filter-chip { display:inline-flex; align-items:center; gap:6px; background:var(--primary-soft); color:var(--primary); border:1.5px solid var(--primary); border-radius:20px; padding:6px 12px; font-size:13px; font-weight:700; cursor:pointer; margin:0 20px 10px; }
.filter-chip:hover { background:var(--primary); color:white; }

/* ==================== CATEGORIES ==================== */
.categories-scroll { display:flex; gap:10px; overflow-x:auto; padding:0 20px 4px; scrollbar-width:none; }
.categories-scroll::-webkit-scrollbar { display:none; }
.category-chip { background:white; border-radius:var(--radius-md); padding:12px 14px; min-width:86px; text-align:center; box-shadow:var(--shadow-sm); cursor:pointer; flex-shrink:0; transition:all .15s; border:2px solid transparent; }
.category-chip:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
.category-chip.active { border-color:var(--primary); background:var(--primary-soft); }
.category-emoji { font-size:26px; margin-bottom:4px; }
.category-label { font-size:11px; font-weight:700; color:var(--text); }

/* ==================== DEALS ==================== */
.deals-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 20px 20px; }
.deals-scroll { display:flex; gap:12px; overflow-x:auto; padding:0 20px 12px; scrollbar-width:none; }
.deals-scroll::-webkit-scrollbar { display:none; }
.deals-scroll .deal-card { width:220px; flex-shrink:0; }

.deal-card { background:white; border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-sm); cursor:pointer; transition:all .2s; position:relative; }
.deal-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-lg); }
.deal-img { width:100%; aspect-ratio:1; position:relative; display:flex; align-items:center; justify-content:center; font-size:64px; overflow:hidden; background:var(--surface-alt); }
.deal-img img { width:100%; height:100%; object-fit:cover; transition:transform .3s; }
.deal-card:hover .deal-img img { transform:scale(1.05); }

.discount-badge { position:absolute; top:10px; background:linear-gradient(135deg, var(--danger), #C0392B); color:white; padding:5px 10px; border-radius:8px; font-weight:900; font-size:13px; z-index:2; box-shadow:0 2px 8px rgba(231,76,60,.4); }
.store-badge { position:absolute; bottom:10px; color:white; padding:4px 10px; border-radius:6px; font-weight:700; font-size:11px; max-width:75%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; z-index:2; box-shadow:0 2px 6px rgba(0,0,0,.2); }
[dir="rtl"] .discount-badge, [dir="rtl"] .store-badge { right:10px; }
[dir="ltr"] .discount-badge, [dir="ltr"] .store-badge { left:10px; }

.fav-badge { position:absolute; top:10px; color:white; background:rgba(0,0,0,.35); border:none; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:15px; z-index:3; backdrop-filter:blur(4px); }
[dir="rtl"] .fav-badge { left:10px; }
[dir="ltr"] .fav-badge { right:10px; }
.fav-badge.active { background:rgba(231,76,60,.9); }

.deal-content { padding:12px; }
.deal-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:8px; line-height:1.35; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:36px; }
.deal-prices { display:flex; align-items:baseline; gap:6px; flex-wrap:wrap; margin-bottom:4px; }
.price-new { font-size:16px; font-weight:900; color:var(--primary); }
.price-old { font-size:11px; color:var(--text-3); text-decoration:line-through; }
.deal-expiry { font-size:10px; color:var(--text-2); margin-top:4px; display:flex; align-items:center; gap:4px; }
.deal-expiry.urgent { color:var(--danger); font-weight:700; }

/* ==================== STORES ==================== */
.stores-scroll { display:flex; gap:10px; overflow-x:auto; padding:0 20px 12px; scrollbar-width:none; }
.stores-scroll::-webkit-scrollbar { display:none; }
.store-chip { background:white; border-radius:var(--radius-md); padding:10px 14px; display:flex; align-items:center; gap:10px; box-shadow:var(--shadow-sm); border:1.5px solid; cursor:pointer; flex-shrink:0; transition:all .15s; }
.store-chip:hover { transform:translateY(-2px); box-shadow:var(--shadow-md); }
.store-logo { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:800; font-size:13px; overflow:hidden; }
.store-logo img { width:100%; height:100%; object-fit:cover; }
.store-name { font-size:13px; font-weight:700; color:var(--text); white-space:nowrap; }

.stores-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 20px 20px; }
.store-card { background:white; border-radius:var(--radius-lg); padding:20px; text-align:center; box-shadow:var(--shadow-sm); cursor:pointer; transition:all .15s; position:relative; overflow:hidden; }
.store-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-md); }
.store-card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:currentColor; }
.store-card-logo { width:64px; height:64px; border-radius:50%; margin:0 auto 12px; display:flex; align-items:center; justify-content:center; color:white; font-size:28px; font-weight:900; box-shadow:var(--shadow-sm); overflow:hidden; }
.store-card-logo img { width:100%; height:100%; object-fit:cover; }
.store-card-name { font-size:15px; font-weight:800; color:var(--text); margin-bottom:2px; }
.store-card-type { font-size:11px; color:var(--text-2); margin-bottom:10px; }
.store-card-count { font-size:12px; font-weight:700; color:var(--primary); background:var(--primary-soft); padding:3px 10px; border-radius:12px; display:inline-block; }
.store-card-link { font-size:11px; color:var(--accent); margin-top:8px; display:block; font-weight:600; }

/* ==================== PROMOS ==================== */
.promo-card { background:white; border-radius:var(--radius-lg); padding:18px; margin:0 20px 14px; box-shadow:var(--shadow-sm); position:relative; overflow:hidden; }
.promo-card::before { content:''; position:absolute; top:0; inset-inline-start:0; width:6px; height:100%; background:var(--primary); }
.promo-card-top { display:flex; align-items:center; gap:12px; margin-bottom:12px; padding-inline-start:4px; }
.promo-logo { width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:800; font-size:19px; box-shadow:var(--shadow-sm); overflow:hidden; }
.promo-logo img { width:100%; height:100%; object-fit:cover; }
.promo-store { font-size:15px; font-weight:800; }
.promo-discount { font-size:16px; font-weight:800; color:var(--primary); margin-top:2px; }
.promo-desc { font-size:13px; color:var(--text-2); margin-bottom:12px; line-height:1.5; }
.promo-code-box { display:flex; align-items:center; gap:10px; background:var(--bg); border:2px dashed var(--primary); border-radius:var(--radius-sm); padding:12px; margin-bottom:10px; }
.promo-code { flex:1; font-size:18px; font-weight:900; color:var(--primary); letter-spacing:2px; font-family:'Courier New',monospace; }
.copy-btn { background:var(--primary); color:white; border:none; padding:8px 16px; border-radius:6px; font-weight:700; cursor:pointer; font-family:inherit; font-size:13px; transition:background .15s; }
.copy-btn:hover { background:var(--primary-dark); }
.copy-btn.copied { background:var(--success); }
.promo-store-link { display:block; text-align:center; padding:10px; background:var(--surface-alt); border-radius:var(--radius-sm); font-weight:700; color:var(--accent); font-size:13px; cursor:pointer; border:none; width:100%; }
.promo-store-link:hover { background:var(--accent); color:white; }

/* ==================== BOTTOM NAV ==================== */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto; background:white; border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:8px 0 12px; z-index:100; box-shadow:0 -4px 20px rgba(0,0,0,.06); }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 10px; cursor:pointer; color:var(--text-3); background:none; border:none; transition:color .15s; position:relative; }
.nav-item.active { color:var(--primary); }
.nav-item.active::before { content:''; position:absolute; top:-8px; left:50%; transform:translateX(-50%); width:6px; height:6px; border-radius:50%; background:var(--primary); }
.nav-icon { font-size:22px; }
.nav-label { font-size:10px; font-weight:700; }

/* ==================== PAGES & BACK BUTTON ==================== */
.page { display:none; }
.page.active { display:block; }
.page-header { padding:20px; display:flex; align-items:center; gap:12px; }
.back-btn { background:var(--surface); border:1px solid var(--border); width:40px; height:40px; border-radius:50%; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:var(--shadow-xs); transition:all .15s; }
.back-btn:hover { background:var(--surface-alt); transform:translateX(-2px); }
[dir="rtl"] .back-btn:hover { transform:translateX(2px); }
.page-header-content { flex:1; }
.page-title { font-size:26px; font-weight:900; color:var(--text); }
.page-subtitle { font-size:13px; color:var(--text-2); margin-top:2px; }

/* ==================== MODAL ==================== */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); z-index:1000; display:none; align-items:flex-end; justify-content:center; animation:fadeIn .2s; backdrop-filter:blur(4px); }
.modal-overlay.active { display:flex; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.modal { background:white; width:100%; max-width:480px; max-height:90vh; border-radius:24px 24px 0 0; overflow:hidden; display:flex; flex-direction:column; animation:slideUp .3s cubic-bezier(.16,1,.3,1); position:relative; }
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.modal-close { position:absolute; top:16px; inset-inline-end:16px; width:36px; height:36px; border-radius:50%; background:rgba(0,0,0,.5); color:white; border:none; cursor:pointer; font-size:18px; z-index:10; backdrop-filter:blur(10px); }
.modal-close:hover { background:rgba(0,0,0,.7); }
.modal-handle { width:40px; height:4px; background:rgba(255,255,255,.6); border-radius:2px; margin:12px auto; position:absolute; top:0; left:50%; transform:translateX(-50%); z-index:10; }
.modal-img { width:100%; aspect-ratio:1; background:var(--surface-alt); position:relative; overflow:hidden; }
.modal-img img { width:100%; height:100%; object-fit:cover; }
.modal-content { padding:20px; overflow-y:auto; flex:1; }
.modal-store-tag { display:inline-flex; align-items:center; gap:8px; padding:5px 12px; border-radius:20px; color:white; font-weight:700; font-size:12px; margin-bottom:10px; }
.modal-title { font-size:22px; font-weight:900; margin-bottom:8px; line-height:1.3; }
.modal-desc { color:var(--text-2); font-size:14px; margin-bottom:18px; line-height:1.5; }
.price-section { background:linear-gradient(135deg, var(--primary-soft) 0%, #FFF5F6 100%); border-radius:var(--radius-lg); padding:18px; margin-bottom:16px; }
.modal-price-new { font-size:34px; font-weight:900; color:var(--primary); line-height:1; }
.modal-price-old { font-size:15px; color:var(--text-3); text-decoration:line-through; margin-top:6px; }
.savings { display:inline-flex; align-items:center; gap:4px; background:var(--success); color:white; padding:5px 12px; border-radius:6px; font-weight:700; font-size:13px; margin-top:10px; }
.expiry-row { display:flex; align-items:center; gap:8px; padding:10px 14px; background:var(--surface-alt); border-radius:var(--radius-sm); font-size:13px; color:var(--text-2); margin-bottom:12px; }
.expiry-row.urgent { background:#FFE5E5; color:var(--danger); font-weight:700; }
.modal-actions { display:flex; gap:10px; padding:14px 20px 18px; border-top:1px solid var(--border); background:white; }
.icon-btn { width:52px; height:52px; border-radius:12px; background:var(--bg); border:1px solid var(--border); font-size:22px; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; }
.icon-btn:hover { background:var(--surface-alt); transform:translateY(-1px); }
.primary-btn { flex:1; background:linear-gradient(135deg, var(--primary), var(--primary-dark)); color:white; border:none; padding:14px 18px; border-radius:12px; font-size:14px; font-weight:800; cursor:pointer; transition:all .15s; box-shadow:0 4px 12px rgba(193,39,45,.3); }
.primary-btn:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(193,39,45,.4); }

/* ==================== EMPTY & LOADING ==================== */
.empty-state { text-align:center; padding:60px 30px; }
.empty-emoji { font-size:72px; margin-bottom:20px; opacity:.6; }
.empty-title { font-size:18px; font-weight:800; margin-bottom:8px; }
.empty-text { color:var(--text-2); line-height:1.5; font-size:14px; max-width:280px; margin:0 auto; }

/* Skeleton loaders */
.skeleton { background:linear-gradient(90deg, var(--surface-alt) 25%, #EDE9E1 50%, var(--surface-alt) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:var(--radius-md); }
@keyframes shimmer { 0% { background-position:200% 0; } 100% { background-position:-200% 0; } }
.skeleton-deal { background:white; border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow-sm); }
.skeleton-deal .sk-img { width:100%; aspect-ratio:1; }
.skeleton-deal .sk-body { padding:12px; }
.skeleton-deal .sk-line { height:12px; border-radius:4px; margin-bottom:8px; }
.skeleton-deal .sk-line.short { width:60%; }

/* ==================== TOAST ==================== */
.toast { position:fixed; top:30px; left:50%; transform:translateX(-50%) translateY(-20px); background:var(--text); color:white; padding:12px 22px; border-radius:12px; font-size:14px; font-weight:600; z-index:2000; opacity:0; transition:all .3s; pointer-events:none; max-width:90%; text-align:center; box-shadow:var(--shadow-lg); }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ==================== RESPONSIVE ==================== */
@media (min-width:600px) {
  .app { max-width:500px; border-radius:0 0 24px 24px; }
  .bottom-nav { max-width:500px; }
}

/* DESKTOP LAYOUT */
@media (min-width:900px) {
  body { background:var(--bg); }
  .shell { background:var(--surface); box-shadow:0 0 60px rgba(0,0,0,.06); min-height:100vh; }
  .sidebar { display:flex; }
  .bottom-nav { display:none; }
  .main { padding-bottom:40px; }

<script>
// ============ I18N ============
const I18N = {
  ar: { brandTag:'أفضل العروض 🇲🇦', greeting:'أهلاً وسهلاً 👋', tagline:'أفضل العروض والتخفيضات في المغرب', searchPlaceholder:'ابحث عن منتج، متجر...', allStores:'جميع المتاجر', codes:'كوبونات', topDeals:'أفضل العروض', myFavs:'المفضلة', categories:'الأقسام', featured:'عروض مميزة', featuredSub:'أفضل عروض هذا الأسبوع', popularStores:'متاجر شعبية', seeAll:'عرض الكل ←', latestDeals:'أحدث العروض', activeOffers:'عرض نشط', storesTitle:'المتاجر', storesWith:'متجر مع عروض', favsTitle:'المفضلة', emptyFavTitle:'لا توجد عناصر في المفضلة', emptyFavText:'أضف العروض بالضغط على القلب ❤️', promosTitle:'كوبونات التخفيض', promosValid:'كوبون ساري', navHome:'الرئيسية', navStores:'المتاجر', navSearch:'البحث', navFavs:'المفضلة', navPromos:'كوبونات', seeOffer:'شاهد العرض ←', goToStore:'اذهب إلى المتجر ←', visitStore:'زيارة الموقع ←', save:'وفر', until:'حتى', daysLeft:'أيام متبقية', expiresToday:'ينتهي اليوم!', expiresTomorrow:'ينتهي غداً', addedFav:'❤️ تمت الإضافة للمفضلة', removedFav:'تم الحذف من المفضلة', copyBtn:'نسخ', copied:'تم النسخ ✓', noResults:'لا توجد نتائج', searchEmpty:'ابدأ بكتابة اسم منتج أو متجر', noDeals:'لا توجد عروض حالياً', noDealsText:'سيتم إضافة عروض جديدة قريباً', noStores:'لا توجد متاجر', noPromos:'لا توجد كوبونات', noDealsStore:'لا توجد عروض لهذا المتجر', dealsAt:'عرض', clearFilter:'إزالة الفلتر ✕', backHome:'العودة للرئيسية' },
  fr: { brandTag:'Meilleures promos 🇲🇦', greeting:'Bonjour 👋', tagline:'Les meilleures promos du Maroc', searchPlaceholder:'Rechercher un produit, magasin...', allStores:'Tous magasins', codes:'Codes promo', topDeals:'Top promos', myFavs:'Favoris', categories:'Catégories', featured:'Offres en vedette', featuredSub:'Meilleures promos cette semaine', popularStores:'Magasins populaires', seeAll:'Voir tout →', latestDeals:'Dernières promos', activeOffers:'offres actives', storesTitle:'Magasins', storesWith:'enseignes avec promos', favsTitle:'Favoris', emptyFavTitle:'Aucun favori pour l\'instant', emptyFavText:'Ajoutez des offres en cliquant sur ❤️', promosTitle:'Codes promo', promosValid:'codes valides', navHome:'Accueil', navStores:'Magasins', navSearch:'Recherche', navFavs:'Favoris', navPromos:'Codes', seeOffer:'Voir l\'offre →', goToStore:'Aller au magasin →', visitStore:'Visiter le site →', save:'Économisez', until:'Jusqu\'au', daysLeft:'jours restants', expiresToday:'Expire aujourd\'hui!', expiresTomorrow:'Expire demain', addedFav:'❤️ Ajouté aux favoris', removedFav:'Retiré des favoris', copyBtn:'Copier', copied:'Copié ✓', noResults:'Aucun résultat', searchEmpty:'Tapez un produit ou un magasin', noDeals:'Aucune promo pour le moment', noDealsText:'De nouvelles promos seront ajoutées bientôt', noStores:'Aucun magasin', noPromos:'Aucun code promo', noDealsStore:'Aucune promo pour ce magasin', dealsAt:'offre(s)', clearFilter:'Effacer le filtre ✕', backHome:'Retour à l\'accueil' }
};

// Official store websites
const STORE_URLS = {
  marjane: 'https://www.marjane.ma',
  carrefour: 'https://www.carrefour.ma',
  bim: 'https://www.bim.ma',
  aswak: 'https://www.aswakassalam.com',
  atacadao: 'https://www.atacadao.ma',
  labelvie: 'https://www.labelvie.ma',
  acima: 'https://www.acima.ma',
  electroplanet: 'https://www.electroplanet.ma',
  biougnach: 'https://www.biougnach.ma',
  decathlon: 'https://www.decathlon.ma',
  hm: 'https://www2.hm.com/fr_ma/',
  jumia: 'https://www.jumia.ma'
};

// ============ FIREBASE INIT ============
let db = null, firebaseReady = false;
try {
  if (typeof firebase !== 'undefined' && firebaseConfig.apiKey !== 'PASTE_YOUR_API_KEY_HERE') {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    firebaseReady = true;
  }
} catch (e) { console.error('Firebase init error:', e); }

// ============ STATE ============
let lang = localStorage.getItem('lang') || 'ar';
let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
let currentFilter = null;
let currentDeal = null;
let DEALS = [], STORES = [], CATEGORIES = [], PROMO_CODES = [];
let dataLoaded = { deals:false, stores:false, categories:false, promos:false };

// ============ HELPERS ============
function t(k) { return I18N[lang][k] || k; }
function getTitle(d) { return lang === 'ar' ? (d.titleAr || d.title) : (d.title || d.titleAr); }
function getStore(id) { return STORES.find(s => s.id === id); }
function getStoreUrl(s) { return (s && STORE_URLS[s.id]) || (s && s.url) || null; }
function currency() { return lang === 'ar' ? 'درهم' : 'DH'; }
function fmt(p) { return p + ' ' + currency(); }
function daysUntil(s) { if (!s) return null; return Math.ceil((new Date(s) - new Date()) / 86400000); }
function expiryLabel(s) {
  const d = daysUntil(s); if (d === null || d < 0) return '';
  if (d === 0) return t('expiresToday');
  if (d === 1) return t('expiresTomorrow');
  if (d <= 7) return d + ' ' + t('daysLeft');
  return t('until') + ' ' + new Date(s).toLocaleDateString(lang === 'ar' ? 'ar-MA' : 'fr-MA', { day:'2-digit', month:'short' });
}
function showToast(m) {
  const el = document.getElementById('toast');
  el.textContent = m;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}
function esc(s) { return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])); }

// ============ LANGUAGE ============
function applyLanguage() {
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
  const label = lang === 'ar' ? 'FR' : 'ع';
  document.getElementById('lang-label').textContent = label;
  const sl = document.getElementById('sidebar-lang-label'); if (sl) sl.textContent = lang === 'ar' ? 'Français' : 'العربية';
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.getAttribute('data-i18n-placeholder')); });
  document.getElementById('current-city').textContent = lang === 'ar' ? 'الدار البيضاء' : 'Casablanca';
}
function toggleLanguage() {
  lang = lang === 'ar' ? 'fr' : 'ar';
  localStorage.setItem('lang', lang);
  applyLanguage();
  renderAll();
}

// ============ NAVIGATION ============
function navigateTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-item, .sidebar-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
  window.scrollTo(0, 0);
  if (page === 'favorites') renderFavorites();
  if (page === 'search') { const si = document.getElementById('search-input'); if (si) si.focus(); }
}

// ============ SKELETONS ============
function skeletonGrid(count) {
  let html = '';
  for (let i = 0; i < count; i++) {
    html += '<div class="skeleton-deal"><div class="skeleton sk-img"></div><div class="sk-body"><div class="skeleton sk-line"></div><div class="skeleton sk-line short"></div></div></div>';
  }
  return html;
}

// ============ RENDERERS ============
function dealImage(d, store) {
  if (d.imageUrl) return '<img src="' + esc(d.imageUrl) + '" alt="' + esc(getTitle(d)) + '" loading="lazy">';
  return '<span>' + (d.emoji || '🛍️') + '</span>';
}

function dealCardHTML(d) {
  const store = getStore(d.storeId);
  if (!store) return '';
  const expiry = expiryLabel(d.expires);
  const urgent = daysUntil(d.expires) !== null && daysUntil(d.expires) <= 3;
  const isFav = favorites.includes(d.id);
  const bg = d.imageUrl ? 'background:' + store.color + '15' : 'background:' + store.color + '22';
  return '<div class="deal-card" onclick="openDealModal(\'' + d.id + '\')">'
    + '<div class="deal-img" style="' + bg + '">'
    +   dealImage(d, store)
    +   '<div class="discount-badge">-' + d.disc + '%</div>'
    +   '<div class="store-badge" style="background:' + store.color + '">' + esc(store.name) + '</div>'
    +   '<button class="fav-badge ' + (isFav ? 'active' : '') + '" onclick="event.stopPropagation(); toggleFav(\'' + d.id + '\')">' + (isFav ? '❤️' : '🤍') + '</button>'
    + '</div>'
    + '<div class="deal-content">'
    +   '<div class="deal-title">' + esc(getTitle(d)) + '</div>'
    +   '<div class="deal-prices"><span class="price-new">' + fmt(d.new) + '</span><span class="price-old">' + fmt(d.old) + '</span></div>'
    +   (expiry ? '<div class="deal-expiry ' + (urgent ? 'urgent' : '') + '">⏰ ' + esc(expiry) + '</div>' : '')
    + '</div></div>';
}

function renderCategories() {
  const c = document.getElementById('categories-container');
  if (CATEGORIES.length === 0) { c.innerHTML = ''; return; }
  c.innerHTML = CATEGORIES.map(cat =>
    '<div class="category-chip ' + (currentFilter === cat.id ? 'active' : '') + '" onclick="filterByCategory(\'' + cat.id + '\')"><div class="category-emoji">' + (cat.icon || '📂') + '</div><div class="category-label">' + esc(cat[lang] || cat.ar || cat.fr || cat.id) + '</div></div>'
  ).join('');
}

function renderFeatured() {
  const c = document.getElementById('featured-deals');
  if (!dataLoaded.deals) { c.innerHTML = skeletonGrid(4).replace(/skeleton-deal/g, 'skeleton-deal').split('').join(''); return; }
  const featured = DEALS.filter(d => d.featured);
  if (featured.length === 0) { c.innerHTML = ''; document.querySelector('#page-home .section-header:has(#featured-deals)')?.classList.add('hidden'); return; }
  c.innerHTML = featured.map(dealCardHTML).join('');
}

function renderStoresScroll() {
  const c = document.getElementById('stores-scroll');
  if (STORES.length === 0) { c.innerHTML = ''; return; }
  c.innerHTML = STORES.slice(0, 10).map(s =>
    '<div class="store-chip" style="border-color:' + s.color + '" onclick="filterByStore(\'' + s.id + '\')"><div class="store-logo" style="background:' + s.color + '">' + (s.logoUrl ? '<img src="' + esc(s.logoUrl) + '">' : esc(s.name.charAt(0))) + '</div><div class="store-name">' + esc(s.name) + '</div></div>'
  ).join('');
}

function renderFilterChip() {
  const c = document.getElementById('current-filter-chip');
  if (!currentFilter) { c.innerHTML = ''; return; }
  let label = '';
  if (currentFilter === 'featured') label = '🔥 ' + t('featured');
  else {
    const cat = CATEGORIES.find(x => x.id === currentFilter);
    const store = STORES.find(x => x.id === currentFilter);
    if (cat) label = (cat.icon || '📂') + ' ' + (cat[lang] || cat.ar || cat.fr);
    else if (store) label = '🏪 ' + store.name;
  }
  if (label) c.innerHTML = '<button class="filter-chip" onclick="clearFilter()">' + esc(label) + ' · ' + t('clearFilter') + '</button>';
}

function renderDealsGrid() {
  let deals = DEALS;
  if (currentFilter) {
    if (currentFilter === 'featured') deals = DEALS.filter(d => d.featured);
    else if (CATEGORIES.find(c => c.id === currentFilter)) deals = DEALS.filter(d => d.cat === currentFilter);
    else if (STORES.find(s => s.id === currentFilter)) deals = DEALS.filter(d => d.storeId === currentFilter);
  }
  // Filter out expired
  deals = deals.filter(d => !d.expires || new Date(d.expires) >= new Date(new Date().setHours(0,0,0,0)));
  document.getElementById('deals-count').textContent = deals.length;
  const c = document.getElementById('deals-grid');
  if (!dataLoaded.deals) { c.innerHTML = skeletonGrid(6); return; }
  renderFilterChip();
  if (deals.length === 0) {
    c.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-emoji">🛍️</div><div class="empty-title">' + t('noDeals') + '</div><div class="empty-text">' + t('noDealsText') + '</div></div>';
  } else {
    c.innerHTML = deals.map(dealCardHTML).join('');
  }
}

function renderStoresGrid() {
  const c = document.getElementById('stores-grid');
  if (!dataLoaded.stores) { c.innerHTML = skeletonGrid(6); return; }
  if (STORES.length === 0) {
    c.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-emoji">🏪</div><div class="empty-title">' + t('noStores') + '</div></div>';
  } else {
    c.innerHTML = STORES.map(s => {
      const dealCount = DEALS.filter(d => d.storeId === s.id).length;
      const url = getStoreUrl(s);
      return '<div class="store-card" style="color:' + s.color + '" onclick="onStoreCardClick(\'' + s.id + '\')">'
        + '<div class="store-card-logo" style="background:' + s.color + '">' + (s.logoUrl ? '<img src="' + esc(s.logoUrl) + '">' : esc(s.name.charAt(0))) + '</div>'
        + '<div class="store-card-name">' + esc(s.name) + '</div>'
        + '<div class="store-card-type">' + esc(lang === 'ar' ? (s.type || '') : (s.typeFr || '')) + '</div>'
        + '<div class="store-card-count">' + dealCount + ' ' + t('dealsAt') + '</div>'
        + (url ? '<div class="store-card-link">🔗 ' + t('visitStore') + '</div>' : '')
        + '</div>';
    }).join('');
  }
  document.getElementById('stores-count').textContent = STORES.length;
}

function onStoreCardClick(id) {
  const store = STORES.find(s => s.id === id);
  if (!store) return;
  const url = getStoreUrl(store);
  const dealCount = DEALS.filter(d => d.storeId === id).length;
  // If store has deals, show them. Otherwise open external.
  if (dealCount > 0) {
    filterByStore(id);
  } else if (url) {
    window.open(url, '_blank');
  } else {
    showToast(t('noDealsStore'));
  }
}

function renderFavorites() {
  const favDeals = DEALS.filter(d => favorites.includes(d.id));
  const container = document.getElementById('favorites-content');
  if (favDeals.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-emoji">❤️</div><div class="empty-title">' + t('emptyFavTitle') + '</div><div class="empty-text">' + t('emptyFavText') + '</div></div>';
  } else {
    container.innerHTML = '<div class="deals-grid">' + favDeals.map(dealCardHTML).join('') + '</div>';
  }
}

function renderPromos() {
  const c = document.getElementById('promos-list');
  if (!dataLoaded.promos) { c.innerHTML = '<div style="padding:20px;">' + skeletonGrid(3) + '</div>'; return; }
  if (PROMO_CODES.length === 0) {
    c.innerHTML = '<div class="empty-state"><div class="empty-emoji">🎟️</div><div class="empty-title">' + t('noPromos') + '</div></div>';
  } else {
    c.innerHTML = PROMO_CODES.map((p, i) => {
      const store = getStore(p.storeId) || { color:'#999', name:p.store || '?' };
      const link = p.link || getStoreUrl(store);
      return '<div class="promo-card">'
        + '<div class="promo-card-top">'
        +   '<div class="promo-logo" style="background:' + store.color + '">' + (store.logoUrl ? '<img src="' + esc(store.logoUrl) + '">' : esc((p.store || store.name).charAt(0))) + '</div>'
        +   '<div><div class="promo-store">' + esc(p.store || store.name) + '</div><div class="promo-discount">' + esc(lang === 'ar' ? (p.discountAr || p.discount || '') : (p.discount || p.discountAr || '')) + '</div></div>'
        + '</div>'
        + '<div class="promo-desc">' + esc(lang === 'ar' ? (p.descAr || p.desc || '') : (p.desc || p.descAr || '')) + '</div>'
        + '<div class="promo-code-box"><div class="promo-code">' + esc(p.code) + '</div><button class="copy-btn" id="copy-' + i + '" onclick="copyCode(\'' + esc(p.code) + '\', ' + i + ')">' + t('copyBtn') + '</button></div>'
        + (link ? '<button class="promo-store-link" onclick="window.open(\'' + link + '\', \'_blank\')">' + t('visitStore') + '</button>' : '')
        + '</div>';
    }).join('');
  }
  document.getElementById('promos-count').textContent = PROMO_CODES.length;
}

// ============ FILTERS ============
function filterByCategory(id) {
  currentFilter = currentFilter === id ? null : id;
  renderCategories();
  renderDealsGrid();
  setTimeout(() => document.getElementById('deals-grid').scrollIntoView({ behavior:'smooth', block:'start' }), 50);
}
function filterByStore(id) {
  currentFilter = id;
  navigateTo('home');
  renderDealsGrid();
  setTimeout(() => document.getElementById('deals-grid').scrollIntoView({ behavior:'smooth', block:'start' }), 100);
}
function filterByFeatured() {
  currentFilter = 'featured';
  navigateTo('home');
  renderDealsGrid();
  setTimeout(() => document.getElementById('deals-grid').scrollIntoView({ behavior:'smooth', block:'start' }), 100);
}
function clearFilter() {
  currentFilter = null;
  renderCategories();
  renderDealsGrid();
}

// ============ SEARCH ============
function doSearch(q) {
  q = q.trim().toLowerCase();
  const results = q.length === 0 ? [] : DEALS.filter(d =>
    (d.title && d.title.toLowerCase().includes(q)) ||
    (d.titleAr && d.titleAr.includes(q)) ||
    (d.desc && d.desc.toLowerCase().includes(q)) ||
    (getStore(d.storeId) && getStore(d.storeId).name.toLowerCase().includes(q))
  );
  const c = document.getElementById('search-results');
  if (q.length === 0) c.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-emoji">🔍</div><div class="empty-text">' + t('searchEmpty') + '</div></div>';
  else if (results.length === 0) c.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-emoji">😕</div><div class="empty-title">' + t('noResults') + '</div></div>';
  else c.innerHTML = results.map(dealCardHTML).join('');
}

// ============ MODAL ============
function openDealModal(id) {
  const d = DEALS.find(x => x.id === id);
  if (!d) return;
  currentDeal = d;
  const store = getStore(d.storeId) || { color:'#999', name:'?' };
  const imgEl = document.getElementById('modal-img');
  if (d.imageUrl) imgEl.innerHTML = '<img src="' + esc(d.imageUrl) + '" alt="' + esc(getTitle(d)) + '">';
  else imgEl.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:140px;background:linear-gradient(135deg,' + store.color + '22,' + store.color + '11)">' + (d.emoji || '🛍️') + '</div>';

  document.getElementById('modal-store-tag').innerHTML = '🏪 ' + esc(store.name);
  document.getElementById('modal-store-tag').style.background = store.color;
  document.getElementById('modal-title').textContent = getTitle(d);
  document.getElementById('modal-desc').textContent = d.desc || '';
  document.getElementById('modal-price-new').textContent = fmt(d.new);
  document.getElementById('modal-price-old').textContent = fmt(d.old);
  document.getElementById('modal-savings').innerHTML = '💰 ' + t('save') + ' ' + fmt(d.old - d.new);
  const expiryEl = document.getElementById('modal-expiry');
  const urgent = daysUntil(d.expires) !== null && daysUntil(d.expires) <= 3;
  expiryEl.textContent = '⏰ ' + expiryLabel(d.expires);
  expiryEl.classList.toggle('urgent', urgent);
  document.getElementById('modal-fav-btn').textContent = favorites.includes(d.id) ? '❤️' : '🤍';
  document.getElementById('modal-action-btn').textContent = d.link ? t('seeOffer') : (getStoreUrl(store) ? t('visitStore') : t('goToStore'));
  document.getElementById('deal-modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('deal-modal').classList.remove('active');
  document.body.style.overflow = '';
}
function toggleFav(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
    showToast(t('removedFav'));
  } else {
    favorites.push(id);
    showToast(t('addedFav'));
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  renderDealsGrid();
  renderFeatured();
  renderFavorites();
}
function toggleFavModal() {
  if (!currentDeal) return;
  toggleFav(currentDeal.id);
  document.getElementById('modal-fav-btn').textContent = favorites.includes(currentDeal.id) ? '❤️' : '🤍';
}
function openDealLink() {
  if (!currentDeal) return;
  if (currentDeal.link) { window.open(currentDeal.link, '_blank'); return; }
  const store = getStore(currentDeal.storeId);
  const url = getStoreUrl(store);
  if (url) window.open(url, '_blank');
  else showToast((lang === 'ar' ? 'ابحث عن هذا العرض في ' : 'Cherchez cette offre chez ') + (store ? store.name : '?'));
}
function shareDeal() {
  if (!currentDeal) return;
  const text = getTitle(currentDeal) + ' - ' + fmt(currentDeal.new) + ' (' + currentDeal.disc + '% ' + (lang === 'ar' ? 'خصم' : 'off') + ') · Promos Maroc';
  const url = window.location.href;
  if (navigator.share) navigator.share({ title:'Promos Maroc', text, url }).catch(()=>{});
  else { navigator.clipboard.writeText(text + ' ' + url); showToast(lang === 'ar' ? 'تم النسخ للمشاركة' : 'Copié pour partager'); }
}
function copyCode(code, idx) {
  navigator.clipboard.writeText(code);
  const btn = document.getElementById('copy-' + idx);
  btn.textContent = t('copied');
  btn.classList.add('copied');
  showToast(code + ' ' + (lang === 'ar' ? 'تم النسخ' : 'copié'));
  setTimeout(() => { btn.textContent = t('copyBtn'); btn.classList.remove('copied'); }, 2000);
}

// ============ RENDER ALL ============
function renderAll() {
  renderCategories();
  renderFeatured();
  renderStoresScroll();
  renderDealsGrid();
  renderStoresGrid();
  renderFavorites();
  renderPromos();
}

// ============ FIREBASE LIVE ============
function loadFromFirebase() {
  if (!firebaseReady) {
    document.getElementById('deals-grid').innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-emoji">⚙️</div><div class="empty-title">' + (lang === 'ar' ? 'لم يتم إعداد Firebase' : 'Firebase non configuré') + '</div></div>';
    return;
  }
  // Show skeletons immediately
  renderDealsGrid();
  renderStoresGrid();
  renderPromos();

  db.collection('deals').onSnapshot(snap => {
    DEALS = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    dataLoaded.deals = true;
    renderFeatured(); renderDealsGrid(); renderFavorites(); renderStoresGrid();
  }, err => console.error('Deals load error:', err));

  db.collection('stores').onSnapshot(snap => {
    STORES = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    dataLoaded.stores = true;
    renderStoresScroll(); renderStoresGrid(); renderDealsGrid(); renderFeatured(); renderPromos();
  }, err => console.error('Stores load error:', err));

  db.collection('categories').onSnapshot(snap => {
    CATEGORIES = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    dataLoaded.categories = true;
    renderCategories();
  }, err => console.error('Categories load error:', err));

  db.collection('promos').onSnapshot(snap => {
    PROMO_CODES = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    dataLoaded.promos = true;
    renderPromos();
  }, err => console.error('Promos load error:', err));
}

// ============ INIT ============
applyLanguage();
loadFromFirebase();
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
