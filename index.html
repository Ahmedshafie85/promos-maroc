  { store:'Jumia', storeId:'jumia', code:'PROMO10', discount:'10% de réduction', discountAr:'خصم 10%', desc:'Sur votre première commande, min. 300 DH', descAr:'على طلبك الأول، بحد أدنى 300 درهم', link:'https://www.jumia.ma' },

  { store:'Decathlon', storeId:'decathlon', code:'SPORT15', discount:'15% sur les vêtements', discountAr:'15% على الملابس', desc:"Min. 500 DH d'achat", descAr:'بحد أدنى 500 درهم', link:'https://www.decathlon.ma' },
  { store:'Marjane', storeId:'marjane', code:'MARJANE50', discount:'50 DH offerts', discountAr:'50 درهم مجانية', desc:"Dès 500 DH d'achat", descAr:'على شراء 500 درهم أو أكثر', link:'https://www.marjane.ma' },
  { store:'Jumia', storeId:'jumia', code:'TECH25', discount:"25% sur l'électronique", discountAr:'25% على الإلكترونيات', desc:'Smartphones, tablettes, min. 1000 DH', descAr:'الهواتف الذكية، اللوحيات', link:'https://www.jumia.ma' }
];
let lang = localStorage.getItem('lang') || 'ar';
let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
let currentFilter = null;
let currentDeal = null;
function t(k) { return I18N[lang][k] || k; }
function getTitle(d) { return lang === 'ar' ? (d.titleAr || d.title) : d.title; }
function getStore(id) { return STORES.find(s => s.id === id); }
function currency() { return lang === 'ar' ? 'درهم' : 'DH'; }
function fmt(p) { return p + ' ' + currency(); }
function daysUntil(s) { return Math.ceil((new Date(s) - new Date()) / 86400000); }
function expiryLabel(s) {
  const d = daysUntil(s);
  if (d < 0) return '';
  if (d === 0) return t('expiresToday');
  if (d === 1) return t('expiresTomorrow');
  if (d <= 7) return d + ' ' + t('daysLeft');
  return t('until') + ' ' + new Date(s).toLocaleDateString(lang === 'ar' ? 'ar-MA' : 'fr-MA', { day:'2-digit', month:'short' });
}
function showToast(m) {
  const el = document.getElementById('toast');
  el.textContent = m;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}
function applyLanguage() {
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.getElementById('lang-label').textContent = lang === 'ar' ? 'FR' : 'ع';
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.getAttribute('data-i18n-placeholder')); });
  document.getElementById('current-city').textContent = lang === 'ar' ? 'الدار البيضاء' : 'Casablanca';
}
function toggleLanguage() {
  lang = lang === 'ar' ? 'fr' : 'ar';
  localStorage.setItem('lang', lang);
  applyLanguage();
  renderAll();
}
function navigateTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
  window.scrollTo(0, 0);
  if (page === 'favorites') renderFavorites();
  if (page === 'search') document.getElementById('search-input').focus();
}
function dealCardHTML(d) {
  const store = getStore(d.storeId);
  const expiry = expiryLabel(d.expires);
  return '<div class="deal-card" onclick="openDealModal(' + d.id + ')"><div class="deal-img" style="background:' + store.color + '22">' + d.emoji + '<div class="discount-badge">-' + d.disc + '%</div><div class="store-badge" style="background:' + store.color + '">' + store.name + '</div></div><div class="deal-content"><div class="deal-title">' + getTitle(d) + '</div><div class="deal-prices"><span class="price-new">' + fmt(d.new) + '</span><span class="price-old">' + fmt(d.old) + '</span></div>' + (expiry ? '<div class="deal-expiry">⏰ ' + expiry + '</div>' : '') + '</div></div>';
}
function renderCategories() {
  document.getElementById('categories-container').innerHTML = CATEGORIES.map(c =>
    '<div class="category-chip ' + (currentFilter === c.id ? 'active' : '') + '" onclick="filterByCategory(\'' + c.id + '\')"><div class="category-emoji">' + c.icon + '</div><div class="category-label">' + c[lang] + '</div></div>'
  ).join('');
}
function renderFeatured() {
  document.getElementById('featured-deals').innerHTML = DEALS.filter(d => d.featured).map(dealCardHTML).join('');
}
function renderStoresScroll() {
  document.getElementById('stores-scroll').innerHTML = STORES.slice(0, 8).map(s =>
    '<div class="store-chip" style="border-color:' + s.color + '" onclick="filterByStore(\'' + s.id + '\')"><div class="store-logo" style="background:' + s.color + '">' + s.name.charAt(0) + '</div><div class="store-name">' + s.name + '</div></div>'
  ).join('');
}
function renderDealsGrid() {
  let deals = DEALS;
  if (currentFilter) {
    if (currentFilter === 'featured') deals = DEALS.filter(d => d.featured);
    else if (CATEGORIES.find(c => c.id === currentFilter)) deals = DEALS.filter(d => d.cat === currentFilter);
    else if (STORES.find(s => s.id === currentFilter)) deals = DEALS.filter(d => d.storeId === currentFilter);
  }
  document.getElementById('deals-count').textContent = deals.length;
  document.getElementById('deals-grid').innerHTML = deals.map(dealCardHTML).join('');
}
function renderStoresGrid() {
  document.getElementById('stores-grid').innerHTML = STORES.map(s =>
    '<div class="store-card" onclick="filterByStore(\'' + s.id + '\'); navigateTo(\'home\');"><div class="store-card-logo" style="background:' + s.color + '">' + s.name.charAt(0) + '</div><div class="store-card-name">' + s.name + '</div><div class="store-card-type">' + (lang === 'ar' ? s.type : s.typeFr) + '</div></div>'
  ).join('');
  document.getElementById('stores-count').textContent = STORES.length;
}
function renderFavorites() {
  const favDeals = DEALS.filter(d => favorites.includes(d.id));
  const container = document.getElementById('favorites-content');
  if (favDeals.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-emoji">❤️</div><div class="empty-title">' + t('emptyFavTitle') + '</div><div class="empty-text">' + t('emptyFavText') + '</div></div>';
  } else {
    container.innerHTML = '<div class="deals-grid">' + favDeals.map(dealCardHTML).join('') + '</div>';
  }
}
function renderPromos() {
  document.getElementById('promos-list').innerHTML = PROMO_CODES.map((p, i) => {
    const store = getStore(p.storeId);
    return '<div class="promo-card"><div class="promo-card-top"><div class="promo-logo" style="background:' + store.color + '">' + p.store.charAt(0) + '</div><div><div class="promo-store">' + p.store + '</div><div class="promo-discount">' + (lang === 'ar' ? p.discountAr : p.discount) + '</div></div></div><div class="promo-desc">' + (lang === 'ar' ? p.descAr : p.desc) + '</div><div class="promo-code-box"><div class="promo-code">' + p.code + '</div><button class="copy-btn" id="copy-' + i + '" onclick="copyCode(\'' + p.code + '\', ' + i + ')">' + t('copyBtn') + '</button></div><button class="copy-btn" style="width:100%;padding:10px" onclick="window.open(\'' + p.link + '\', \'_blank\')">' + (lang === 'ar' ? 'زيارة المتجر ←' : 'Visiter le magasin →') + '</button></div>';
  }).join('');
  document.getElementById('promos-count').textContent = PROMO_CODES.length;
}
function filterByCategory(id) {
  currentFilter = currentFilter === id ? null : id;
  renderCategories();
  renderDealsGrid();
}
function filterByStore(id) {
  currentFilter = id;
  renderDealsGrid();
  navigateTo('home');
}
function filterByFeatured() {
  currentFilter = 'featured';
  renderDealsGrid();
}
function doSearch(q) {
  q = q.trim().toLowerCase();
  const results = q.length === 0 ? [] : DEALS.filter(d => d.title.toLowerCase().includes(q) || (d.titleAr && d.titleAr.includes(q)) || d.desc.toLowerCase().includes(q));
  const c = document.getElementById('search-results');
  if (q.length === 0) c.innerHTML = '<div class="empty-state"><div class="empty-emoji">🔍</div><div class="empty-text">' + t('searchEmpty') + '</div></div>';
  else if (results.length === 0) c.innerHTML = '<div class="empty-state"><div class="empty-emoji">😕</div><div class="empty-title">' + t('noResults') + '</div></div>';
  else c.innerHTML = results.map(dealCardHTML).join('');
}
function openDealModal(id) {
  const d = DEALS.find(x => x.id === id);
  if (!d) return;
  currentDeal = d;
  const store = getStore(d.storeId);
  document.getElementById('modal-img').innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:120px;background:' + store.color + '22">' + d.emoji + '</div>';
  document.getElementById('modal-title').textContent = getTitle(d);
  document.getElementById('modal-desc').textContent = d.desc;
  document.getElementById('modal-price-new').textContent = fmt(d.new);
  document.getElementById('modal-price-old').textContent = fmt(d.old);
  document.getElementById('modal-savings').textContent = t('save') + ' ' + fmt(d.old - d.new);
  document.getElementById('modal-expiry').textContent = '⏰ ' + expiryLabel(d.expires);
  document.getElementById('modal-fav-btn').textContent = favorites.includes(d.id) ? '❤️' : '🤍';
  document.getElementById('modal-action-btn').textContent = d.link ? t('seeOffer') : t('goToStore');
  document.getElementById('deal-modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('deal-modal').classList.remove('active');
  document.body.style.overflow = '';
}
function toggleFavModal() {
  if (!currentDeal) return;
  const id = currentDeal.id;
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
    showToast(t('removedFav'));
  } else {
    favorites.push(id);
    showToast(t('addedFav'));
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  document.getElementById('modal-fav-btn').textContent = favorites.includes(id) ? '❤️' : '🤍';
}
function openDealLink() {
  if (currentDeal && currentDeal.link) window.open(currentDeal.link, '_blank');
  else if (currentDeal) {
    const s = getStore(currentDeal.storeId);
    showToast((lang === 'ar' ? 'ابحث عن هذا العرض في ' : 'Cherchez cette offre chez ') + s.name);
  }
}
function shareDeal() {
  if (!currentDeal) return;
  const text = getTitle(currentDeal) + ' - ' + fmt(currentDeal.new) + ' (' + currentDeal.disc + '% ' + (lang === 'ar' ? 'خصم' : 'off') + ')';
  if (navigator.share) navigator.share({ title:'Promos Maroc', text });
  else { navigator.clipboard.writeText(text); showToast(lang === 'ar' ? 'تم النسخ للمشاركة' : 'Copié pour partager'); }
}
function copyCode(code, idx) {
  navigator.clipboard.writeText(code);
  const btn = document.getElementById('copy-' + idx);
  btn.textContent = t('copied');
  btn.classList.add('copied');
  showToast(code + ' ' + (lang === 'ar' ? 'تم النسخ' : 'copié'));
  setTimeout(() => { btn.textContent = t('copyBtn'); btn.classList.remove('copied'); }, 2000);
}
function renderAll() {
  renderCategories();
  renderFeatured();
  renderStoresScroll();
  renderDealsGrid();
  renderStoresGrid();
  renderFavorites();
  renderPromos();
}
applyLanguage();
renderAll();
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
